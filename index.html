let _mxWired=false;
function _mxWireControls(){
  if(_mxWired) return; _mxWired=true;
  document.querySelectorAll('#mx-ai-seg button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#mx-ai-seg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');_mxAI=b.dataset.ai;});
  const cols=document.getElementById('wheel-matrix-cols'), pct=document.getElementById('mx-zpct');
  let mz=1; function setMZ(v){mz=Math.max(.6,Math.min(2.4,v));if(cols)cols.style.zoom=mz;if(pct)pct.textContent=Math.round(mz*100)+'%';}
  const zi=document.getElementById('mx-zi'),zo=document.getElementById('mx-zo');
  if(zi)zi.onclick=()=>setMZ(mz*1.15); if(zo)zo.onclick=()=>setMZ(mz/1.15);
  if(cols){
    cols.addEventListener('wheel',e=>{if(e.ctrlKey){e.preventDefault();setMZ(mz*(e.deltaY>0?.9:1.1));}},{passive:false});
    let pinch=null; const dist=t=>Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
    cols.addEventListener('touchstart',e=>{if(e.touches.length===2)pinch={d:dist(e.touches),z:mz};},{passive:true});
    cols.addEventListener('touchmove',e=>{if(pinch&&e.touches.length===2){e.preventDefault();setMZ(pinch.z*dist(e.touches)/pinch.d);}},{passive:false});
    cols.addEventListener('touchend',e=>{if(e.touches.length<2)pinch=null;});
  }
  const dv=document.getElementById('wheel-divider'), left=document.getElementById('wheel-left'), split=document.getElementById('wheel-split');
  if(dv&&left&&split){let st=null;
    dv.addEventListener('pointerdown',e=>{st={x:e.clientX,w:left.getBoundingClientRect().width};dv.classList.add('drag');dv.setPointerCapture(e.pointerId);e.preventDefault();});
    dv.addEventListener('pointermove',e=>{if(!st)return;const total=split.getBoundingClientRect().width;let w=st.w+(e.clientX-st.x);w=Math.max(140,Math.min(total-140,w));left.style.flex='0 0 '+w+'px';});
    const end=()=>{st=null;dv.classList.remove('drag');};dv.addEventListener('pointerup',end);dv.addEventListener('pointercancel',end);
  }
}

  _zwZoom=1; _zwPanX=0; _zwPanY=0; // reseta zoom/pan ao abrir novo dia
  const toggleWrap=document.getElementById('wheel-mode-toggle');
  if(toggleWrap) toggleWrap.style.display = NATAL_ACTIVE ? 'flex' : 'none';
  renderZodiacWheelInPanel('today');
  // Populate foto section
  populateWheelFoto(dayOfYear);
  // Only center if not already positioned by drag/resize (i.e. first open or after close)
  if(!panel._anchored){
    const pw=Math.min(940, window.innerWidth*0.98);
    const ph=Math.min(window.innerWidth>900?660:Math.round(pw*1.4), window.innerHeight*0.92);
    panel.style.width=pw+'px';
    panel.style.height=ph+'px';
    panel.style.left=Math.round((window.innerWidth-pw)/2)+'px';
    panel.style.top=Math.round((window.innerHeight-ph)/2)+'px';
    panel.style.transform='none';
    panel.style.bottom='auto'; panel.style.right='auto';
    panel._anchored=true;
  }
  panel.classList.add('visible');
}

  {id:'Saturno', n:'Saturno', sym:'♄',col:'#c8aa60',orbitIdx:6,size:12,drawFn:'saturn'},
  {id:'Quiron',  n:'Quíron',  sym:'⚷',col:'#60a890',orbitIdx:7,size:7, drawFn:'chiron'},
  {id:'Urano',   n:'Urano',   sym:'♅',col:'#70b8cc',orbitIdx:8,size:10,drawFn:'uranus'},
  {id:'Netuno',  n:'Netuno',  sym:'♆',col:'#5070cc',orbitIdx:9,size:10,drawFn:'neptune'},

// Retrograde ranges (same as main PL rt:[])
const _RT={
  Venus:[[62,105]],
  Mercurio:[[69,101],[187,218],[305,337]],
  Saturno:[[164,300]],
  Urano:[[249,365]],
  Netuno:[[185,344]],
  Plutao:[[124,286]],
  Quiron:[[207,365]],
};

function _isRx(id,doy){const r=_RT[id];return r?r.some(([s,e])=>doy>=s&&doy<=e):false;}
function _getSgKey(d){return _SO[Math.floor(((d%360)+360)%360/30)];}
function _getDIS(d){return ((d%30)+30)%30;}
function _getNak(deg){
  const d=((deg%360)+360)%360;
  const n=['Ashwini','Bharani','Krittika','Rohini','Mrigashira','Ardra','Punarvasu','Pushya',
    'Ashlesha','Magha','Purva Phalguni','Uttara Phalguni','Hasta','Chitra','Swati','Vishakha',
    'Anuradha','Jyeshtha','Mula','Purva Ashadha','Uttara Ashadha','Shravana','Dhanishtha',
    'Shatabhisha','Purva Bhadrapada','Uttara Bhadrapada','Revati'];
  return n[Math.floor(d/13.333)%27];
}
function _moonPhase(moonDeg,sunDeg){
  let diff=((moonDeg-sunDeg)%360+360)%360;
  if(diff<22.5||diff>=337.5)return{name:'Lua Nova',sym:'🌑'};
  if(diff<67.5)return{name:'Crescente',sym:'🌒'};
  if(diff<112.5)return{name:'Quarto Crescente',sym:'🌓'};
  if(diff<157.5)return{name:'Gibosa Crescente',sym:'🌔'};
  if(diff<202.5)return{name:'Lua Cheia',sym:'🌕'};
  if(diff<247.5)return{name:'Gibosa Minguante',sym:'🌖'};
  if(diff<292.5)return{name:'Quarto Minguante',sym:'🌗'};
  return{name:'Minguante',sym:'🌘'};
}

// ── Build planet array for a given dayOfYear ─────────────────────
function _buildPlanets(dayOfYear){
  const PD = window.__EPHEM_DEGS;   // exposed by main script
  const idx = Math.min(dayOfYear-1, 364);
  if(!PD){ console.warn('__EPHEM_DEGS not ready'); }

  return _PL_TMPL.map(t=>{
    let deg = 0;
    if(PD && PD[t.id] && PD[t.id][idx] !== undefined){
      deg = ((PD[t.id][idx] % 360) + 360) % 360;
    }
    return Object.assign({}, t, {deg, rx: _isRx(t.id, dayOfYear)});
  });
}

// ── Screen positions for hover ────────────────────────────────────
let _screenPos = [];

// ── Draw ──────────────────────────────────────────────────────────
function _drawOrrery(planets){
  const canvas = document.getElementById('orrery-canvas');
  if(!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W   = canvas.offsetWidth || 520;
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(W * dpr);
  canvas.style.width  = W + 'px';
  canvas.style.height = W + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const cx = W/2, cy = W/2;
  ctx.clearRect(0, 0, W, W);

  const zodR = W*.455, zodW = W*.082, zodInner = zodR - zodW;

  // ── FATIAS DE SIGNO: do anel até a Terra ──
  // Fundo = elemento (mesma textura das barras do Gantt, em bandas radiais,
  // mais forte no anel e esmaecendo ao centro). Contorno = modalidade
  // (reto=FIXO, zigzag=CARDINAL, ondulado=MUTÁVEL), como nas barras.
  const _MODCOL={FIXO:'#999',CARDINAL:'#888',MUTAVEL:'#888'};

  _SO.forEach((sk,i)=>{
    const sg=_SG[sk];
    const meta=SG[sk]; // SG global: e ('AGUA' sem acento) + m (modalidade)
    const el=ELEM[meta.e];
    const a0=(180-i*30)*Math.PI/180, a1=(180-(i+1)*30)*Math.PI/180;
    const aMid=(a0+a1)/2;

    // path da fatia completa (centro → borda externa do anel)
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,zodR,a0,a1,true);
    ctx.closePath();
    ctx.clip();

    // 1) fundo do elemento — idêntico ao das barras
    ctx.fillStyle=el.bg;
    ctx.fillRect(cx-zodR,cy-zodR,zodR*2,zodR*2);

    // 2) textura do elemento em bandas radiais (mesma escala das barras),
    //    orientada pra fora: chamas/montanhas apontando pro anel
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(aMid+Math.PI/2);
    const hw=zodR*0.30, bandH=40;
    for(let by=-zodR; by<0; by+=bandH){
      drawTexture(ctx,meta.e,-hw,by,hw*2,Math.min(bandH,-by));
    }
    ctx.restore();

    // 3) véu esmaecendo em direção ao centro — zona dos planetas limpa
    const fade=ctx.createRadialGradient(cx,cy,0,cx,cy,zodR);
    fade.addColorStop(0,  'rgba(248,247,243,.97)');
    fade.addColorStop(.45,'rgba(248,247,243,.80)');
    fade.addColorStop(.82,'rgba(248,247,243,.30)');
    fade.addColorStop(1,  'rgba(248,247,243,.06)');
    ctx.fillStyle=fade;
    ctx.fillRect(cx-zodR,cy-zodR,zodR*2,zodR*2);

    // 4) faixa do anel um tique mais saturada — moldura do glifo
    ctx.beginPath();
    ctx.arc(cx,cy,zodR,a0,a1,true);
    ctx.arc(cx,cy,zodInner,a1,a0,false);
    ctx.closePath();
    ctx.fillStyle=el.stroke+'1c';
    ctx.fill();

    ctx.restore();

    // 5) glifo do signo
    const sr=zodInner+(zodR-zodInner)*.5;
    ctx.save();
    ctx.font=`${W*.031}px "Noto Sans Symbols 2",serif`;
    ctx.fillStyle=_SCOL[sk]+'dd'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(sg.sym, cx+sr*Math.cos(aMid), cy+sr*Math.sin(aMid));
    ctx.restore();
  });

  // ── Contornos de modalidade (por cima de todos os fundos) ──
  // Inset angular pra contornos de fatias vizinhas conviverem lado a lado
  function _modRadial(mod,ang,r0,r1){
    ctx.save();ctx.translate(cx,cy);ctx.rotate(ang);
    ctx.beginPath();
    if(mod==='FIXO'){ctx.moveTo(r0,0);ctx.lineTo(r1,0);}
    else if(mod==='CARDINAL'){const seg=8,amp=2.3;let x=r0,f=0;ctx.moveTo(r0,-amp/2);
      while(x<r1){const nx=Math.min(x+seg/2,r1);ctx.lineTo(nx,f?-amp/2:amp/2);f=1-f;x=nx;}}
    else{const freq=12,amp=2.0;ctx.moveTo(r0,0);
      for(let x=r0;x<r1;x+=freq)ctx.bezierCurveTo(x+freq/3,-amp,x+2*freq/3,amp,Math.min(x+freq,r1),0);}
    ctx.stroke();ctx.restore();
  }
  function _modArc(mod,r,aStart,aEnd){
    // arco estilizado (aEnd < aStart, sentido anti-horário como as fatias)
    ctx.beginPath();
    if(mod==='FIXO'){ctx.arc(cx,cy,r,aStart,aEnd,true);}
    else if(mod==='CARDINAL'){const stepA=8/r,amp=2.3;let a=aStart,f=0;
      ctx.moveTo(cx+(r-amp/2)*Math.cos(a),cy+(r-amp/2)*Math.sin(a));
      while(a>aEnd){const na=Math.max(a-stepA/2,aEnd);const rr=f?r-amp/2:r+amp/2;
        ctx.lineTo(cx+rr*Math.cos(na),cy+rr*Math.sin(na));f=1-f;a=na;}}
    else{const stepA=3/r,amp=2.0,k=Math.PI*2/(12/r);let first=true;
      for(let a=aStart;a>=aEnd;a-=stepA){const rr=r+amp*Math.sin((aStart-a)*k);
        const x=cx+rr*Math.cos(a),y=cy+rr*Math.sin(a);
        first?ctx.moveTo(x,y):ctx.lineTo(x,y);first=false;}}
    ctx.stroke();
  }
  _SO.forEach((sk,i)=>{
    const mod=SG[sk].m;
    const a0=(180-i*30)*Math.PI/180, a1=(180-(i+1)*30)*Math.PI/180;
    const epsA=2.4/zodR; // inset angular ≈2.4px no anel
    ctx.save();
    ctx.strokeStyle=_MODCOL[mod]; ctx.lineWidth=1.1; ctx.globalAlpha=.75;
    ctx.lineCap='round'; ctx.lineJoin='round';
    const r0=W*.045, r1=zodR-2;
    _modRadial(mod, a0-epsA, r0, r1);
    _modRadial(mod, a1+epsA, r0, r1);
    _modArc(mod, r1, a0-epsA, a1+epsA);
    ctx.restore();
  });

  ctx.beginPath(); ctx.arc(cx,cy,zodR,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,.2)'; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx,cy,zodInner,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,.07)'; ctx.lineWidth=.5; ctx.stroke();

  // Curved orbit label helper
  function drawCurvedText(text,r,startAngle,col,fSize){
    ctx.save(); ctx.font=`${fSize}px "Cinzel",serif`; ctx.fillStyle=col;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const totalW=ctx.measureText(text).width, totalAngle=totalW/r;
    let a=startAngle-totalAngle/2;
    for(let i=0;i<text.length;i++){
      const ch=text[i], chW=ctx.measureText(ch).width, chAngle=chW/r;
      const charA=a+chAngle/2;
      ctx.save(); ctx.translate(cx+r*Math.cos(charA), cy+r*Math.sin(charA));
      ctx.rotate(charA+Math.PI/2); ctx.fillText(ch,0,0); ctx.restore();
      a+=chAngle;
    }
    ctx.restore();
  }

  const ORBIT_NAME={Lua:'Lua',Mercurio:'Mercúrio',Venus:'Vênus',Sol:'Sol',
    Marte:'Marte',Jupiter:'Júpiter',Saturno:'Saturno',Quiron:'Quíron',
    Urano:'Urano',Netuno:'Netuno',Plutao:'Plutão'};

  // Orbit rings + labels
  planets.filter(p=>!p.mathPoint).forEach(pl=>{
    const r=_ORBIT_R[pl.orbitIdx]*zodInner;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(150,140,190,.2)'; ctx.lineWidth=.6; ctx.setLineDash([]); ctx.stroke();
    if(r<=W*.06) return;
    const lbl=ORBIT_NAME[pl.id]||pl.n, fSize=Math.max(6,Math.min(8.5,W*.014));
    ctx.save(); ctx.font=`${fSize}px "Cinzel",serif`;
    const txtW=ctx.measureText(lbl).width; ctx.restore();
    const plAngle=(180-pl.deg)*Math.PI/180;
    const margin=(pl.size*(W/540)+4)/r;
    drawCurvedText(lbl, r, plAngle+(txtW/r/2+margin), pl.col+'bb', fSize);
  });

  // Lines: center → planet → zodiac ring + degree label
  planets.filter(p=>!p.mathPoint).forEach(pl=>{
    const r=_ORBIT_R[pl.orbitIdx]*zodInner;
    const angle=(180-pl.deg)*Math.PI/180;
    const px=cx+r*Math.cos(angle), py=cy+r*Math.sin(angle);
    const zx=cx+zodInner*Math.cos(angle), zy=cy+zodInner*Math.sin(angle);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(px,py);
    ctx.strokeStyle=pl.col+'55'; ctx.lineWidth=.7; ctx.setLineDash([2,4]); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(zx,zy);
    ctx.strokeStyle=pl.col+'70'; ctx.lineWidth=.8; ctx.stroke();
    ctx.beginPath(); ctx.arc(zx,zy,1.8,0,Math.PI*2); ctx.fillStyle=pl.col+'cc'; ctx.fill();
    const lr=zodInner-9;
    ctx.save(); ctx.font=`bold ${W*.016}px monospace`; ctx.fillStyle=pl.col+'ff';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor='rgba(255,255,255,.95)'; ctx.shadowBlur=3;
    ctx.fillText(_getDIS(pl.deg).toFixed(0)+'°', cx+lr*Math.cos(angle), cy+lr*Math.sin(angle));
    ctx.restore();
  });

  // Earth
  const earthR=W*.022;
  const eg=ctx.createRadialGradient(cx-earthR*.3,cy-earthR*.3,0,cx,cy,earthR);
  eg.addColorStop(0,'#80e080'); eg.addColorStop(.4,'#3a8add'); eg.addColorStop(1,'#1a3060');
  ctx.beginPath(); ctx.arc(cx,cy,earthR,0,Math.PI*2); ctx.fillStyle=eg; ctx.fill();
  ctx.strokeStyle='rgba(100,180,100,.6)'; ctx.lineWidth=1; ctx.stroke();

  // Planet bodies
  _screenPos=[];
  _screenPos.push({id:'Terra',x:cx,y:cy,r:earthR+6,pl:{id:'Terra',n:'Terra',sym:'⊕',col:'#3a8add',deg:0,rx:false,isEarth:true}});
  const placed=[];

  function getPlPos(pl){
    const r=_ORBIT_R[pl.orbitIdx]*zodInner;
    const angle=(180-pl.deg)*Math.PI/180;
    let px=cx+r*Math.cos(angle), py=cy+r*Math.sin(angle);
    for(let iter=0;iter<12;iter++){
      let clash=false;
      for(const p of placed){
        const dx=px-p.x, dy=py-p.y, dist=Math.sqrt(dx*dx+dy*dy);
        const minD=pl.size*(W/540)+p.size+4;
        if(dist<minD){clash=true;const push=(minD-dist)*.6;const nx=dist>0?dx/dist:1,ny=dist>0?dy/dist:0;px+=nx*push;py+=ny*push;}
      }
      if(!clash) break;
    }
    placed.push({x:px,y:py,size:pl.size*(W/540)});
    return {x:px,y:py};
  }

  planets.filter(p=>!p.mathPoint).forEach(pl=>{
    const{x:px,y:py}=getPlPos(pl);
    const s=pl.size*(W/540);
    _screenPos.push({id:pl.id,x:px,y:py,r:s+4,pl});

    if(pl.drawFn==='sun'){
      const halo=ctx.createRadialGradient(px,py,s*.5,px,py,s*2.6);
      halo.addColorStop(0,'rgba(255,220,60,.38)'); halo.addColorStop(.5,'rgba(255,180,20,.12)'); halo.addColorStop(1,'rgba(255,200,50,0)');
      ctx.fillStyle=halo; ctx.beginPath(); ctx.arc(px,py,s*2.6,0,Math.PI*2); ctx.fill();
      const sg2=ctx.createRadialGradient(px-s*.35,py-s*.35,s*.1,px,py,s);
      sg2.addColorStop(0,'#fffbe8'); sg2.addColorStop(.25,'#fff060'); sg2.addColorStop(.6,'#f8b820'); sg2.addColorStop(.85,'#e87000'); sg2.addColorStop(1,'#c04000');
      ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.fillStyle=sg2; ctx.fill();
      ctx.save();
      for(let i=0;i<16;i++){const ra=i*Math.PI/8;const isL=i%2===0;
        ctx.strokeStyle=`rgba(255,220,50,${isL?.55:.3})`; ctx.lineWidth=isL?.9:.5;
        ctx.beginPath(); ctx.moveTo(px+(s*1.12)*Math.cos(ra),py+(s*1.12)*Math.sin(ra));
        ctx.lineTo(px+(isL?s*2.0:s*1.55)*Math.cos(ra),py+(isL?s*2.0:s*1.55)*Math.sin(ra)); ctx.stroke();}
      ctx.restore();
    } else if(pl.drawFn==='moon'){
      ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.fillStyle='#18162e'; ctx.fill();
      ctx.save(); ctx.beginPath(); ctx.arc(px,py,s,Math.PI*.5,Math.PI*1.5); ctx.fillStyle='#d0c8f0'; ctx.fill(); ctx.restore();
    } else if(pl.drawFn==='saturn'){
      const sg3=ctx.createRadialGradient(px,py,0,px,py,s);
      sg3.addColorStop(0,'#e8d090'); sg3.addColorStop(.6,'#c8a040'); sg3.addColorStop(1,'#704010');
      ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.fillStyle=sg3; ctx.fill();
      ctx.save(); ctx.translate(px,py); ctx.scale(1,.3);
      ctx.beginPath(); ctx.arc(0,0,s*1.9,0,Math.PI*2);
      ctx.strokeStyle='rgba(200,170,80,.5)'; ctx.lineWidth=s*.5; ctx.stroke(); ctx.restore();
      ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.fillStyle=sg3; ctx.fill();
    } else if(pl.drawFn==='jupiter'){
      const jg=ctx.createRadialGradient(px,py,0,px,py,s);
      jg.addColorStop(0,'#f0d090'); jg.addColorStop(.5,'#c88040'); jg.addColorStop(1,'#703020');
      ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.fillStyle=jg; ctx.fill();
      ctx.save(); ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.clip();
      [-.38,.0,.38].forEach(yO=>{ctx.beginPath(); ctx.rect(px-s,py+yO*s-s*.11,s*2,s*.1); ctx.fillStyle='rgba(160,70,20,.38)'; ctx.fill();}); ctx.restore();
    } else if(pl.drawFn==='mars'){
      const mg=ctx.createRadialGradient(px-s*.3,py-s*.3,0,px,py,s);
      mg.addColorStop(0,'#ff7050'); mg.addColorStop(.5,'#dd3020'); mg.addColorStop(1,'#601010');
      ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.fillStyle=mg; ctx.fill();
    } else if(pl.drawFn==='venus'){
      const vg=ctx.createRadialGradient(px-s*.3,py-s*.3,0,px,py,s);
      vg.addColorStop(0,'#fff0e8'); vg.addColorStop(.4,'#e8a0c0'); vg.addColorStop(1,'#804060');
      ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.fillStyle=vg; ctx.fill();
    } else if(pl.drawFn==='mercury'){
      const mcg=ctx.createRadialGradient(px-s*.3,py-s*.3,0,px,py,s);
      mcg.addColorStop(0,'#d0e0f0'); mcg.addColorStop(.5,'#8090a8'); mcg.addColorStop(1,'#303848');
      ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.fillStyle=mcg; ctx.fill();
    } else if(pl.drawFn==='uranus'){
      const ug=ctx.createRadialGradient(px,py,0,px,py,s);
      ug.addColorStop(0,'#b0e8f8'); ug.addColorStop(.6,'#4090b0'); ug.addColorStop(1,'#102840');
      ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.fillStyle=ug; ctx.fill();
      ctx.save(); ctx.translate(px,py); ctx.scale(.28,1);
      ctx.beginPath(); ctx.arc(0,0,s*1.5,0,Math.PI*2);
      ctx.strokeStyle='rgba(112,184,204,.38)'; ctx.lineWidth=s*.28; ctx.stroke(); ctx.restore();
    } else if(pl.drawFn==='neptune'){
      const ng=ctx.createRadialGradient(px,py,0,px,py,s);
      ng.addColorStop(0,'#90a8f8'); ng.addColorStop(.5,'#3040cc'); ng.addColorStop(1,'#100820');
      ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.fillStyle=ng; ctx.fill();
    } else if(pl.drawFn==='pluto'){
      const pg=ctx.createRadialGradient(px,py,0,px,py,s);
      pg.addColorStop(0,'#c090e0'); pg.addColorStop(.5,'#7040a0'); pg.addColorStop(1,'#200830');
      ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.fillStyle=pg; ctx.fill();
    } else if(pl.drawFn==='chiron'){
      const cg=ctx.createRadialGradient(px,py,0,px,py,s);
      cg.addColorStop(0,'#90e0c8'); cg.addColorStop(1,'#2a6050');
      ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.fillStyle=cg; ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2); ctx.fillStyle=pl.col; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(px,py,s,0,Math.PI*2);
    ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.lineWidth=.8; ctx.stroke();
    if(pl.rx){
      ctx.save(); ctx.font=`bold ${W*.018}px monospace`; ctx.fillStyle='#e05030';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('℞',px,py+s+W*.013); ctx.restore();
    }
  });

  // Math points (Lilith, NodoN) between Pluto orbit and zodiac ring
  const rPlutao=_ORBIT_R[10]*zodInner;
  planets.filter(p=>p.mathPoint).forEach(pl=>{
    const angle=(180-pl.deg)*Math.PI/180;
    const symSize=W*.026, symRadius=symSize*.7;
    const rGrau=zodInner-10;
    const grauX=cx+rGrau*Math.cos(angle), grauY=cy+rGrau*Math.sin(angle);
    const symR2=rGrau-(symRadius+W*.018);
    const px=cx+symR2*Math.cos(angle), py=cy+symR2*Math.sin(angle);
    _screenPos.push({id:pl.id,x:px,y:py,r:symRadius+4,pl});
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(px,py);
    ctx.strokeStyle=pl.col+'38'; ctx.lineWidth=.55; ctx.setLineDash([2,4]); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(grauX,grauY);
    ctx.strokeStyle=pl.col+'77'; ctx.lineWidth=.7; ctx.stroke();
    const re={x:cx+zodInner*Math.cos(angle),y:cy+zodInner*Math.sin(angle)};
    ctx.beginPath(); ctx.arc(re.x,re.y,1.8,0,Math.PI*2); ctx.fillStyle=pl.col+'cc'; ctx.fill();
    ctx.save(); ctx.font=`bold ${W*.013}px monospace`; ctx.fillStyle=pl.col+'ff';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.shadowColor='rgba(255,255,255,.9)'; ctx.shadowBlur=2;
    ctx.fillText(_getDIS(pl.deg).toFixed(0)+'°',grauX,grauY); ctx.restore();
    ctx.save(); ctx.font=`${symSize}px "Noto Sans Symbols 2","Segoe UI Symbol",serif`;
    ctx.fillStyle=pl.col; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.shadowBlur=0;
    ctx.fillText(pl.sym,px,py); ctx.restore();
  });
}

// ── Planet bar ────────────────────────────────────────────────────
function _renderBar(planets){
  const bar=document.getElementById('orrery-pl-bar');
  if(!bar) return;
  bar.innerHTML='';
  planets.forEach(pl=>{
    const sk=_getSgKey(pl.deg), sg=_SG[sk];
    const c=document.createElement('div');
    c.style.cssText='flex:0 0 25%;padding:6px 7px;border-right:1px solid rgba(200,168,75,.07);border-bottom:1px solid rgba(200,168,75,.07);font-family:sans-serif;box-sizing:border-box';
    c.innerHTML=`<div style="font-size:21px;line-height:1;margin-bottom:2px;color:${pl.col}">${pl.sym}</div>
<div style="font-size:10.5px;font-weight:600;color:${pl.col};letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${pl.n}</div>
<div style="font-size:9.8px;color:#888;font-family:monospace;line-height:1.5;margin-top:1px">${_getDIS(pl.deg).toFixed(1)}° ${sg.sym} ${sg.n}</div>
<div style="font-size:9px;color:#aaa;opacity:.7">✦ ${_getNak(pl.deg)}</div>
${pl.rx?'<div style="font-size:9px;color:#e05030;font-weight:700">℞</div>':''}`;
    bar.appendChild(c);
  });
}

// ── Tooltip ───────────────────────────────────────────────────────
function _setupTooltip(canvas, planets){
  const tt=document.getElementById('orrery-tooltip');
  if(!tt||!canvas) return;

  // Remove previous listeners by replacing with named refs stored on canvas
  if(canvas._orrMM){ canvas.removeEventListener('mousemove', canvas._orrMM); }
  if(canvas._orrML){ canvas.removeEventListener('mouseleave', canvas._orrML); }
  if(canvas._orrTS){ canvas.removeEventListener('touchstart', canvas._orrTS); }

  function _hit(clientX,clientY,mx,my){
    let hit=null;
    for(const p of _screenPos){const dx=mx-p.x,dy=my-p.y;if(Math.sqrt(dx*dx+dy*dy)<=p.r+6){hit=p;break;}}
    if(hit){
      const pl=hit.pl, sk=_getSgKey(pl.deg), sg=_SG[sk]||{n:'',sym:''};
      const d=_getDIS(pl.deg).toFixed(1);
      document.getElementById('ott-sym').textContent=pl.sym;
      document.getElementById('ott-sym').style.color=pl.col;
      document.getElementById('ott-name').textContent=pl.n;
      document.getElementById('ott-name').style.color=pl.col;
      if(pl.isEarth){
        document.getElementById('ott-pos').innerHTML='Terra ao Centro · Vista Geocêntrica';
        document.getElementById('ott-rx').textContent='';
        document.getElementById('ott-arch').textContent='Sideral Fagan-Bradley 25°06\'';
      } else if(pl.id==='Lua'){
        const sol=planets.find(p=>p.id==='Sol');
        const fase=sol?_moonPhase(pl.deg,sol.deg):{name:'',sym:''};
        document.getElementById('ott-pos').innerHTML=`${d}° de ${sg.n} ${sg.sym}<br>✦ ${_getNak(pl.deg)}<br>${fase.sym} ${fase.name}`;
        document.getElementById('ott-rx').textContent=pl.rx?'℞ Retrógrado':'';
        document.getElementById('ott-arch').textContent=_ARCH[pl.id]||'';
      } else {
        document.getElementById('ott-pos').innerHTML=`${d}° de ${sg.n} ${sg.sym}<br>✦ ${_getNak(pl.deg)}`;
        document.getElementById('ott-rx').textContent=pl.rx?'℞ Retrógrado':'';
        document.getElementById('ott-arch').textContent=_ARCH[pl.id]||'';
      }
      tt.style.display='block';
      let tx=clientX+14, ty=clientY-10;
      if(tx+165>window.innerWidth) tx=clientX-165;
      if(ty+130>window.innerHeight) ty=clientY-130;
      tt.style.left=tx+'px'; tt.style.top=ty+'px';
    } else { tt.style.display='none'; }
  }

  canvas._orrMM = e=>{
    const rect=canvas.getBoundingClientRect();
    _hit(e.clientX,e.clientY,(e.clientX-rect.left),(e.clientY-rect.top));
  };
  canvas._orrML = ()=>{ tt.style.display='none'; };
  canvas._orrTS = e=>{
    e.preventDefault();
    const touch=e.touches[0], rect=canvas.getBoundingClientRect();
    _hit(touch.clientX,touch.clientY,(touch.clientX-rect.left),(touch.clientY-rect.top));
  };
  canvas.addEventListener('mousemove', canvas._orrMM);
  canvas.addEventListener('mouseleave', canvas._orrML);
  canvas.addEventListener('touchstart', canvas._orrTS, {passive:false});
}

// ── Public: called by renderWheel ────────────────────────────────
// Canvas zoom scale (1 = fill container, >1 = bigger)
let _wZoom=1;
let _wLastDay=1;
let _wPanX=0, _wPanY=0; // deslocamento de arrasto (pan) quando ampliada

function _clampPan(base,W){
  // não deixa a roda fugir totalmente da janela: margem de 60px
  const max=Math.max(0,(W-base)/2)+60;
  _wPanX=Math.max(-max,Math.min(max,_wPanX));
  _wPanY=Math.max(-max,Math.min(max,_wPanY));
}

function _orreryDraw(){
  const canvas=document.getElementById('orrery-canvas');
  const wrap=document.getElementById('wheel-canvas-wrap');
  if(!canvas||!wrap) return;
  const planets=_buildPlanets(_wLastDay);

  // Size canvas to container * zoom
  const baseW=wrap.clientWidth||520;
  const baseH=wrap.clientHeight||520;
  const base=Math.min(baseW,baseH); // square base
  const W=Math.round(base*_wZoom);

  // Center canvas inside wrap (+ pan do arrasto)
  _clampPan(base,W);
  canvas.style.width=W+'px';
  canvas.style.height=W+'px';
  canvas.style.position='absolute';
  canvas.style.left=Math.round((baseW-W)/2+_wPanX)+'px';
  canvas.style.top=Math.round((baseH-W)/2+_wPanY)+'px';

  _drawOrrery(planets);
  _renderBar(planets);
  _setupTooltip(canvas,planets);

  // Update zoom % label
  const pct=document.getElementById('wheel-zoom-pct');
  if(pct) pct.textContent=Math.round(_wZoom*100)+'%';
}

function _orreryRender(dayOfYear){
  const canvas=document.getElementById('orrery-canvas');
  if(!canvas){ console.warn('orrery-canvas not found'); return; }
  _wLastDay=dayOfYear;
  _wZoom=1; // reset zoom on new day
  _wPanX=0; _wPanY=0; // reset pan on new day

  function _go(){
    _orreryDraw();

    // ResizeObserver on the wrap — fires when panel is resized by mouse drag
    const wrap=document.getElementById('wheel-canvas-wrap');
    if(wrap && !wrap._orrRObs){
      let _rt=null;
      wrap._orrRObs=new ResizeObserver(()=>{
        clearTimeout(_rt);
        _rt=setTimeout(()=>_orreryDraw(),40);
      });
      wrap._orrRObs.observe(wrap);
    }

    // ── Arrastar (pan) + pinça + zoom no cursor — mouse e toque ──
    if(wrap && !wrap._panBound){
      wrap._panBound=true;
      wrap.style.touchAction='none'; // habilita pointer events no toque
      const ptrs=new Map(); // pointers ativos
      let panStart=null, pinchStart=null;

      wrap.addEventListener('pointerdown',e=>{
        ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
        if(ptrs.size===1){
          panStart={x:e.clientX,y:e.clientY,px:_wPanX,py:_wPanY,moved:false};
        }else if(ptrs.size===2){
          const [a,b]=[...ptrs.values()];
          pinchStart={d:Math.hypot(a.x-b.x,a.y-b.y),z:_wZoom,
            mx:(a.x+b.x)/2,my:(a.y+b.y)/2,px:_wPanX,py:_wPanY};
          panStart=null;
        }
        wrap.setPointerCapture&&wrap.setPointerCapture(e.pointerId);
      });

      wrap.addEventListener('pointermove',e=>{
        if(!ptrs.has(e.pointerId)) return;
        ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
        if(pinchStart && ptrs.size===2){
          // pinça: escala ancorada no ponto médio dos dedos
          const [a,b]=[...ptrs.values()];
          const d=Math.hypot(a.x-b.x,a.y-b.y);
          const nz=Math.max(0.4,Math.min(4,pinchStart.z*(d/pinchStart.d)));
          const rect=wrap.getBoundingClientRect();
          const mx=pinchStart.mx-rect.left-rect.width/2;
          const my=pinchStart.my-rect.top -rect.height/2;
          const k=nz/_wZoom;
          _wPanX=mx-(mx-_wPanX)*k;
          _wPanY=my-(my-_wPanY)*k;
          _wZoom=nz;
          _orreryDraw();
        }else if(panStart && ptrs.size===1){
          const dx=e.clientX-panStart.x, dy=e.clientY-panStart.y;
          if(Math.abs(dx)+Math.abs(dy)>4) panStart.moved=true;
          if(panStart.moved){
            _wPanX=panStart.px+dx; _wPanY=panStart.py+dy;
            // reposiciona direto (leve) — sem redesenhar o canvas
            const cv=document.getElementById('orrery-canvas');
            const baseW=wrap.clientWidth||520, baseH=wrap.clientHeight||520;
            const base=Math.min(baseW,baseH), Wc=Math.round(base*_wZoom);
            _clampPan(base,Wc);
            cv.style.left=Math.round((baseW-Wc)/2+_wPanX)+'px';
            cv.style.top =Math.round((baseH-Wc)/2+_wPanY)+'px';
          }
        }
      });

      const _end=e=>{
        ptrs.delete(e.pointerId);
        if(ptrs.size<2) pinchStart=null;
        if(ptrs.size===0){
          // suprime o clique se foi arrasto (não abrir tooltip/seleção sem querer)
          if(panStart&&panStart.moved){
            const block=ev=>{ev.stopPropagation();ev.preventDefault();
              wrap.removeEventListener('click',block,true);};
            wrap.addEventListener('click',block,true);
            setTimeout(()=>wrap.removeEventListener('click',block,true),80);
          }
          panStart=null;
        }
      };
      wrap.addEventListener('pointerup',_end);
      wrap.addEventListener('pointercancel',_end);

      // zoom de scroll ancorado no cursor
      wrap.addEventListener('wheel',e=>{
        e.preventDefault();
        const nz=Math.max(0.4,Math.min(4,+( _wZoom*(e.deltaY>0?0.9:1.1) ).toFixed(3)));
        if(nz===_wZoom) return;
        const rect=wrap.getBoundingClientRect();
        const mx=e.clientX-rect.left-rect.width/2;
        const my=e.clientY-rect.top -rect.height/2;
        const k=nz/_wZoom;
        _wPanX=mx-(mx-_wPanX)*k;
        _wPanY=my-(my-_wPanY)*k;
        _wZoom=nz;
        _orreryDraw();
      },{passive:false});
    }

    // Zoom buttons
    const btnIn=document.getElementById('wz-in');
    const btnOut=document.getElementById('wz-out');
    const btnReset=document.getElementById('wz-reset');
    if(btnIn && !btnIn._bound){
      btnIn._bound=true;
      btnIn.addEventListener('click',()=>{_wZoom=Math.min(4,+(_wZoom+0.15).toFixed(2));_orreryDraw();});
      btnOut.addEventListener('click',()=>{_wZoom=Math.max(0.4,+(_wZoom-0.15).toFixed(2));_orreryDraw();});
      btnReset.addEventListener('click',()=>{_wZoom=1;_wPanX=0;_wPanY=0;_orreryDraw();});
    }
  }

  if(document.fonts && document.fonts.status==='loaded'){_go();}
  else if(document.fonts){document.fonts.ready.then(_go);}
  else{_go();}
}

window._orreryRender=_orreryRender;

})();
</script>
