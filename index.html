// ── RENDER CARD ─────────────────────────────────────────────────
function renderCard(panel,cfg){
  const{aspSym,aspLabel,lvl,pA,pB,sgA,sgB,exactDay,exD,startD,endD,dur,funcType}=cfg;

  const th=ASP_THEME[funcType]||ASP_THEME.sq;
  const aspGl=ASP_GL[funcType]||{sym:aspSym,n:aspLabel,grau:'',kw:'',desc:''};

  // Graus reais (sideral)
  const absA=getAbsDeg(pA.id,exactDay);
  const absB=getAbsDeg(pB.id,exactDay);
  const degA=absA!==null?((absA%30+30)%30).toFixed(1)+'°':'?';
  const degB=absB!==null?((absB%30+30)%30).toFixed(1)+'°':'?';

  // Nakshatras
  const nakObjA=absA!==null?getNakshatra(absA):null;
  const nakObjB=absB!==null?getNakshatra(absB):null;
  const nakA=nakObjA?nakObjA.name:'—';
  const nakB=nakObjB?nakObjB.name:'—';

  // Glossários
  const sgGlA=SIGN_GL[sgA]||{n:sgA||'?',sym:'',el:'',mod:'',ruler:'',kw:'',desc:''};
  const sgGlB=SIGN_GL[sgB]||{n:sgB||'?',sym:'',el:'',mod:'',ruler:'',kw:'',desc:''};
  const pGlA=PLANET_GL[pA.id]||{sym:pA.sym||'?',kw:'',desc:''};
  const pGlB=PLANET_GL[pB.id]||{sym:pB.sym||'?',kw:'',desc:''};
  const nGlA=NAK_GL[nakA]||null;
  const nGlB=NAK_GL[nakB]||null;
  const sameSg=sgA===sgB;
  const sameNak=nakA===nakB;

  // Prompt — use natal override if present, otherwise build collective prompt
  const aspNames={sq:'quadratura (90°)',conj:'conjunção (0°)',trine:'trígono (120°)',opp:'oposição (180°)',sext:'sextil (60°)'};
  const aspName=aspNames[funcType]||aspLabel;
  const pAstr=`${pA.n} em ${degA} de ${sgGlA.n} (nakshatra ${nakA})`;
  const pBstr=`${pB.n} em ${degB} de ${sgGlB.n} (nakshatra ${nakB})`;
  const prompt = cfg._prompt || `Destrinche o trânsito de ${pAstr} em ${aspName} com ${pBstr}. Data exata: ${exD}. Período: ${startD} a ${endD} de ${EPHEM_STATE.year}. Astrologia sideral ${AYAN_LABEL[EPHEM_STATE.ayanamsa]}. Explique: 1) O que significa cada planeta neste signo e nakshatra 2) O que esse aspecto produz coletivamente — acontecimentos, tendências, áreas afetadas 3) O que significa individualmente — como pode aparecer na vida cotidiana, trabalho, relações, decisões 4) Como navegar essa energia conscientemente. Use apenas o zodíaco sideral Fagan-Bradley — não o tropical.`;
  const txtData = cfg._txtData || [
    `EPHEMERIS SIDERAL ${EPHEM_STATE.year} — ${AYAN_LABEL[EPHEM_STATE.ayanamsa].toUpperCase()}`,
    `${'='.repeat(48)}`,
    `ASPECTO : ${pA.n} ${aspSym} ${pB.n}`,
    `TIPO    : ${aspGl.n} ${aspGl.grau}`,
    `NÍVEL   : ${lvl===1?'⬛ Pesado (lento × lento)':lvl===2?'◼ Médio (lento × pessoal)':'◽ Leve (rápido × rápido)'}`,
    ``,
    `PLANETA A : ${pA.n}`,
    `  Signo   : ${sgGlA.n}`,
    `  Grau    : ${degA}`,
    `  Nakshatra: ${nakA}`,
    ``,
    `PLANETA B : ${pB.n}`,
    `  Signo   : ${sgGlB.n}`,
    `  Grau    : ${degB}`,
    `  Nakshatra: ${nakB}`,
    ``,
    `DATA EXATA : ${exD}`,
    `PERÍODO    : ${startD} → ${endD} (${dur} dias)`,
    `SISTEMA    : Sideral Fagan-Bradley · Ayanamsa 25°06'`,
    ``,
    `${'='.repeat(48)}`,
    `PROMPT PARA IA:`,
    prompt,
  ].join('\n');

  const googleUrl='https://www.google.com/search?q='+encodeURIComponent(prompt);
  const perplexUrl='https://www.perplexity.ai/?q='+encodeURIComponent(prompt);

  // ── gblock helper ─────────────────────────────────────────────
  function gb(icon,tag,title,sub,kw,desc){
    const kwTags=(kw||'').split('·').filter(k=>k.trim()).map(k=>
      `<span class="ap-gb-kw" style="color:${th.accent}">${k.trim()}</span>`).join('');
    return `<div class="ap-gb">
      <div class="ap-gb-head">
        <div class="ap-gb-icon" style="background:${th.badge};color:${th.accent}">${icon}</div>
        <div class="ap-gb-txt">
          <div class="ap-gb-tag" style="color:${th.textMid}">${tag}</div>
          <div class="ap-gb-title" style="color:${th.text}">${title}</div>
          ${sub?`<div class="ap-gb-sub">${sub}</div>`:''}
        </div>
      </div>
      ${kwTags?`<div class="ap-gb-kws">${kwTags}</div>`:''}
      <div class="ap-gb-desc" style="color:${th.text}">${desc}</div>
    </div>`;
  }

  // ── Build HTML ─────────────────────────────────────────────────
  let cd=panel.querySelector('.asp-panel-content');
  if(!cd){cd=document.createElement('div');cd.className='asp-panel-content';panel.appendChild(cd);}
  cd.style.cssText=`background:linear-gradient(170deg,${th.bg},${th.bg2});border:1px solid ${th.border};border-radius:16px;`;

  const lvlLabel=lvl===1?'⬛ Aspecto Pesado':lvl===2?'◼ Aspecto Médio':'◽ Aspecto Leve';

  cd.innerHTML=`
<div class="ap-stripe" style="background:${th.stripe}"></div>
<div class="asp-panel-inner">

  <!-- ✕ fechar -->
  <span class="ap-close" id="${panel.id}-close" style="color:${th.text}">×</span>

  <!-- ═══ HERO: ASPECTO ═══ -->
  <div class="ap-hero">
    ${cfg._isNatal?`<div style="background:rgba(200,160,40,.1);border:1px solid rgba(200,160,40,.35);border-radius:8px;padding:6px 10px;margin-bottom:8px;display:flex;align-items:center;gap:6px"><span style="font-size:15px;color:#c8a028">✦</span><span style="font-size:12px;letter-spacing:1.6px;text-transform:uppercase;font-family:'Courier New',monospace;color:#c8a028;font-weight:700">Trânsito Pessoal · Mapa 17/03/1982 · Diadema-SP</span></div>`:''}
    ${cfg._isReturn?`<div style="background:linear-gradient(90deg,rgba(200,160,40,.15),rgba(200,160,40,.05));border:1px solid rgba(200,160,40,.4);border-radius:8px;padding:7px 12px;margin-bottom:8px;font-size:13.5px;letter-spacing:1.3px;color:#c8a028;font-family:'Courier New',monospace;text-transform:uppercase">⟳ Retorno Planetário — renovação do ciclo</div>`:''}
    ${cfg._isNatalOpp?`<div style="background:linear-gradient(90deg,rgba(204,102,0,.12),rgba(204,102,0,.04));border:1px solid rgba(204,102,0,.35);border-radius:8px;padding:7px 12px;margin-bottom:8px;font-size:13.5px;letter-spacing:1.3px;color:#cc6600;font-family:'Courier New',monospace;text-transform:uppercase">⊙ Oposição ao Natal — meio-ciclo de ${pA.n}</div>`:''}
    ${cfg._isNatalSq?`<div style="background:linear-gradient(90deg,rgba(204,34,34,.12),rgba(204,34,34,.04));border:1px solid rgba(204,34,34,.3);border-radius:8px;padding:7px 12px;margin-bottom:8px;font-size:13.5px;letter-spacing:1.3px;color:#cc2222;font-family:'Courier New',monospace;text-transform:uppercase">□ Fase crítica do ciclo — quadratura de ${pA.n} ao natal</div>`:''}
    <div class="ap-asp-hero">
      <div class="ap-asp-badge" style="background:${th.badge};color:${th.accent};border:1px solid ${th.border}">
        ${aspGl.sym}
      </div>
      <div class="ap-asp-info">
        <div class="ap-asp-level" style="color:${th.accent}">${lvlLabel} · ${aspGl.grau} · Sideral FB</div>
        <div class="ap-asp-name" style="color:${th.text}">${aspGl.n}</div>
        <div class="ap-asp-sub">${aspGl.kw}</div>
      </div>
    </div>

    <!-- Planetas lado a lado -->
    <div class="ap-planets-row">
      <div class="ap-pbox" style="border-color:${th.border}">
        <div class="ap-pbox-sym">${pGlA.sym||pA.sym}</div>
        <div class="ap-pbox-name" style="color:${th.text}">${pA.n}${cfg._isNatal?` <span style="font-size:10.5px;letter-spacing:2px;background:${th.badge};color:${th.accent};border-radius:3px;padding:1px 4px;vertical-align:middle;font-family:'Courier New',monospace">TRÂNSITO</span>`:''}</div>
        <div class="ap-pbox-deg" style="background:${th.badge};color:${th.accent}">${degA}</div>
        <div class="ap-pbox-sign">${sgGlA.sym} ${sgGlA.n}<br>${sgGlA.el} ${sgGlA.mod}</div>
        <div class="ap-pbox-nak">✦ ${nakA}</div>
      </div>
      <div class="ap-asp-sym-mid" style="color:${th.accent}">${aspSym}</div>
      <div class="ap-pbox" style="border-color:${th.border}">
        <div class="ap-pbox-sym">${pGlB.sym||pB.sym}</div>
        <div class="ap-pbox-name" style="color:${th.text}">${pB.n}${cfg._isNatal?` <span style="font-size:10.5px;letter-spacing:2px;background:${th.badge};color:${th.accent};border-radius:3px;padding:1px 4px;vertical-align:middle;font-family:'Courier New',monospace">NATAL · Casa ${cfg._natHouse||'?'}${cfg._natRx?' ℞':''}</span>`:''}</div>
        <div class="ap-pbox-deg" style="background:${th.badge};color:${th.accent}">${degB}</div>
        <div class="ap-pbox-sign">${sgGlB.sym} ${sgGlB.n}<br>${sgGlB.el} ${sgGlB.mod}</div>
        <div class="ap-pbox-nak">✦ ${nakB}</div>
      </div>
    </div>
  </div>

  <!-- ═══ TIMING ═══ -->
  <div class="ap-timing">
    <div class="ap-ti">
      <div class="ap-ti-label">⚡ Data Exata</div>
      <div class="ap-ti-val" style="color:${th.accent}">${exD}</div>
    </div>
    <div class="ap-ti">
      <div class="ap-ti-label">📅 Período</div>
      <div class="ap-ti-val" style="color:${th.text}">${startD} → ${endD}</div>
    </div>
    <div class="ap-ti">
      <div class="ap-ti-label">⏱ Duração</div>
      <div class="ap-ti-val" style="color:${th.text}">${dur} dias</div>
    </div>
  </div>

  <!-- ═══ ASPECTO ═══ -->
  <div class="ap-sec">
    <div class="ap-sec-h" style="color:${th.accent}">○ O Aspecto</div>
    ${gb(aspGl.sym,'Tipo de Aspecto · '+aspGl.grau,aspGl.n,'',aspGl.kw,aspGl.desc)}
  </div>

  <!-- ═══ PLANETAS ═══ -->
  <div class="ap-sec">
    <div class="ap-sec-h" style="color:${th.accent}">◉ Os Planetas</div>
    ${gb(pGlA.sym||pA.sym,(cfg._gbLabelA||'Planeta A · '+sgGlA.n+' '+degA),pA.n,pGlA.kw,pGlA.kw,pGlA.desc)}
    ${gb(pGlB.sym||pB.sym,(cfg._gbLabelB||'Planeta B · '+sgGlB.n+' '+degB),pB.n,pGlB.kw,pGlB.kw,pGlB.desc)}
  </div>

  <!-- ═══ SIGNOS ═══ -->
  <div class="ap-sec">
    <div class="ap-sec-h" style="color:${th.accent}">♎ Os Signos</div>
    ${gb(sgGlA.sym,'Signo · '+sgGlA.el+' '+sgGlA.mod+' · Regente: '+(sgGlA.ruler||'—'),sgGlA.n,'',sgGlA.kw,sgGlA.desc)}
    ${sameSg?`<div style="font-size:12.8px;opacity:.5;padding:0 2px 8px;font-family:monospace">${pB.n} também em ${sgGlA.n}</div>`:gb(sgGlB.sym,'Signo · '+sgGlB.el+' '+sgGlB.mod+' · Regente: '+(sgGlB.ruler||'—'),sgGlB.n,'',sgGlB.kw,sgGlB.desc)}
  </div>

  <!-- ═══ NAKSHATRAS ═══ -->
  ${nGlA||nGlB?`<div class="ap-sec"><div class="ap-sec-h" style="color:${th.accent}">✦ Nakshatras</div>`:''}
  ${nGlA?gb('✦','Nakshatra de '+pA.n+' · Divindade: '+nGlA.dev,nakA,'',nGlA.kw,nGlA.desc):''}
  ${nGlB&&sameNak?`<div style="font-size:12.8px;opacity:.5;padding:0 2px 8px;font-family:monospace">${pB.n} também em ${nakA}</div>`:nGlB?gb('✦','Nakshatra de '+pB.n+' · Divindade: '+nGlB.dev,nakB,'',nGlB.kw,nGlB.desc):''}
  ${nGlA||nGlB?`</div>`:''}

  <!-- ═══ CTA: LEITURA IA ═══ -->
  <div class="ap-cta">
    <div class="ap-sec-h" style="color:${th.accent}">🤖 Destrinche com IA</div>
    <div class="ap-cta-hint" style="border-color:${th.border}">
      Clique em <strong>Google AI</strong> ou <strong>Perplexity</strong> para abrir uma IA com o prompt do trânsito já pronto — pergunte o que quiser sobre esse aspecto. Ou use <strong>Extrair Dados</strong> para baixar os dados e jogar em qualquer IA de sua escolha.
    </div>
    <div class="ap-btns">
      <a href="${googleUrl}" target="_blank" rel="noopener" class="ap-btn"
        style="background:#4285f4;color:#fff">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Google AI
      </a>
      <a href="${perplexUrl}" target="_blank" rel="noopener" class="ap-btn"
        style="background:#20b2aa;color:#fff">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46L4.5 7"/><path d="M14.5 22A2.5 2.5 0 0 1 12 19.5V4.5a2.5 2.5 0 0 1 4.96.46L19.5 17"/></svg>
        Perplexity
      </a>
      <button id="dl-${panel.id}" class="ap-btn"
        style="background:${th.accent};color:#fff">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Extrair
      </button>
    </div>
  </div>

</div>`;

  panel.style.display='block';
  document.getElementById(panel.id+'-close').addEventListener('click',()=>panel.style.display='none');
  const dlBtn=document.getElementById('dl-'+panel.id);
  if(dlBtn) dlBtn.addEventListener('click',()=>{
    const blob=new Blob([txtData],{type:'text/plain;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`${pA.id}_${aspSym}_${pB.id}_sideral_${EPHEM_STATE.year}.txt`;
    a.click();URL.revokeObjectURL(url);
  });
}

  oculto: `O ciclo de sete anos de Urano em Touro foi a preparação do terreno. O que foi destruído nas fundações materiais agora cria o vácuo que a próxima ordem vai preencher. Quem está posicionado para preencher esse vácuo raramente aparece no noticiário durante a ruptura — aparece depois, já estabelecido. Shatabhisha vê o que está acontecendo nas camadas que o barulho superficial não alcança.`,
  indiv: `O ciclo de Urano em Touro (2018–2026) passou por tudo que você considera segurança. Não necessariamente destruindo — mas testando o que era real e o que era apenas hábito. Seus valores mudaram. Sua relação com dinheiro, propriedade e segurança mudou. Você não é quem era em 2018.<br><br>
A quadratura com o Nodo Norte em junho coloca uma pergunta: o mapa que você usa para se orientar — quem você é, o que você quer, onde está indo — foi atualizado? Ou você ainda está tentando reconstruir o que existia antes de 2018 com novos materiais?<br><br>
Especialmente forte para quem está saindo de uma zona de conforto que já se tornou zona de estagnação. Ou quem teve um rompimento inesperado — de emprego, relacionamento, crença, identidade — e ainda está tentando entender o que aconteceu antes de dar o próximo passo.<br><br>

  sombra: `Reconstruir urgentemente a certeza que quebrou — sem entender o que a ruptura estava revelando. Trocar um padrão por outro igualmente limitante porque o vazio assusta mais do que a prisão conhecida.`,
  integracao: `O que você precisaria soltar do mapa antigo para que o destino que o Nodo Norte aponta em Aquário se tornasse possível? Krittika corta. Shatabhisha cura. Essa é a sequência.`,
  luz: `A mente que usa a ruptura como instrumento de percepção — não para destruir tudo, mas para enxergar o que não estava visível antes. O sete anos de Urano em Touro termina em abril de 2026. Você não é quem era. Isso é exatamente o que era necessário.`,
},

// ── 2. CONJUNÇÃO: Saturno ☌ Netuno ─────────────────────────────
'Saturno_Netuno_conj': {
  corpo: `<strong style="opacity:.7">Saturno</strong> e <strong style="opacity:.7">Netuno</strong> se encontram a cada 36 anos. A última vez foi em 1989 — e o Muro de Berlim caiu. O que parecia absolutamente sólido e permanente revelou ser sonho. E o que era considerado impossível virou realidade concreta em questão de semanas. Os dois movimentos aconteceram ao mesmo tempo, no mesmo campo.<br><br>
Em fevereiro de 2026, a conjunção exata ocorre nos últimos graus de Peixes — dentro de <strong style="opacity:.7">Uttara Bhadrapada</strong>, a Serpente das Profundezas, Ahir Budhnya, o oceano primordial que sustenta toda a criação silenciosamente. Esta é a fase balsâmica do ciclo Saturn-Netuno: não o início de algo novo, mas o fechamento completo do que veio antes, a dissolução final do que perdeu sentido.<br><br>
<strong style="opacity:.7">Saturno</strong> é estrutura, responsabilidade, o que o tempo cobra. Em Peixes, aprendeu a construir onde o chão se move, a ser responsável com o invisível. <strong style="opacity:.7">Netuno</strong> em Peixes — no próprio signo — está no pico de sua força: dissolução de fronteiras, acesso ao transcendente, o que conecta ao todo. A <strong style="opacity:.7">conjunção</strong> é fusão completa: dois arquétipos opostos falando com uma voz só.`,
  momento: `Astrólogos descrevem esse momento como um "Great Reset" espiritual — não no sentido político, mas no sentido de que o ciclo de 36 anos que começou em 1989 chega ao fechamento. O que foi construído sobre ilusão agora dissolve. O que foi construído sobre realidade agora permanece.<br><br>
Uttara Bhadrapada: a sabedoria que vem de baixo, do oceano que ninguém vê, que sustenta tudo em silêncio. O que nasce aqui não é barulhento. É silencioso e duradouro — ou silencioso e vazio. A diferença não aparece na hora.`,
  coletivo: `<strong style="opacity:.6">+</strong> Iniciativas de cuidado, saúde coletiva, arte e espiritualidade encontrando estrutura para durar. A fé que se torna prática — não apenas discurso. Projetos que nasceram do sonho genuíno encontrando o rigor necessário para existir no longo prazo. Movimentos que têm tanto magnetismo quanto método. O que é iniciado agora sob intenção honesta carrega força de décadas.<br><br>
<strong style="opacity:.6">−</strong> O mesmo aspecto que sustenta o genuíno também dá vida ao convincente que não é verdadeiro. Narrativas com arquitetura sólida e alma emprestada. Sistemas de crença, figuras carismáticas e movimentos que têm forma e magnetismo ao mesmo tempo são difíceis de questionar com a razão. Quando uma mentira tem método, estética e cronograma, ela passa por verdade muito mais tempo do que deveria.`,
  oculto: `O que nasce sob essa conjunção tende a durar além do que deveria — porque tem tanto estrutura quanto magnetismo, e essa combinação é quase impossível de questionar com a razão pura. A última vez, em 1989, o que surgiu nas ruínas durou décadas. O que está surgindo agora nas ruínas do ciclo que fecha também vai durar. A questão é: quem está construindo com intenção real, e quem está aproveitando a névoa para construir o que parece real?`,
  indiv: `Saturno-Netuno em Peixes opera no que você construiu — ou está construindo — na intersecção entre o que acredita e o que faz na prática.<br><br>
Dois padrões são comuns nesse aspecto. O primeiro: você está investindo energia real num projeto, relacionamento ou crença que no fundo não sabe se é verdadeiro. A ilusão não é ingenuidade — é exatamente a que convence quem pensa muito. Você sabe, em algum nível. Mas ainda não parou para examinar.<br><br>
O segundo: você tem um sonho que sabe que é real, mas que continua só na sua cabeça porque nunca virou data, primeiro passo, comprometimento concreto. A visão existe — falta o ato de Saturno que a ancora no mundo.<br><br>
Especialmente forte para quem trabalha em saúde, arte, espiritualidade ou qualquer área que exige tanto sensibilidade quanto método. Para quem está num processo de cura — física ou emocional — onde a linha entre o genuíno e o wishful thinking precisa ser examinada honestamente. Para quem está fundando algo — uma empresa, uma relação, uma prática — que precisa durar.`,
  sombra: `Trabalhar muito na direção errada. Disciplina e esforço real a serviço de uma ilusão que você já sabe, em alguma camada, que não é verdade. A névoa de Netuno protege a ilusão de ser examinada.`,
  integracao: `Duas perguntas honestas aplicadas ao que importa mais agora: o que estou construindo tem fundação real — não só intenção bonita? E que sonho eu venho adiando porque parece grande demais para ter forma concreta?`,
  luz: `Quando o que você acredita e o que você constrói são a mesma coisa — o que nasce tem uma qualidade que o tempo não dissolve. Uttara Bhadrapada no melhor: a profundidade que sustenta sem precisar aparecer.`,
},

  momento: `Este é considerado um dos aspectos mais férteis de toda a década — parte de uma sequência Jupiter-Saturn trine que marca a primeira fase da Grande Mutação de 200 anos iniciada em 2020. Em Água, o acento é na materialização do que foi sentido profundamente: os sonhos que têm alma encontrando a estrutura que os torna reais.<br><br>

  coletivo: `<strong style="opacity:.6">+</strong> Setores que ganham impulso real: imóveis e construção civil, saúde e cuidado, alimentação consciente, educação emocional, artes e espiritualidade com estrutura sustentável. Redes de apoio comunitário que saem do discurso e viram realidade. Iniciativas de saúde mental e bem-estar que encontram financiamento e forma. Aquele projeto de longo prazo que a comunidade precisava — agora tem condições de sair do papel com solidez real.<br><br>

  oculto: `A Grande Mutação de 2020 plantou sementes num novo ciclo de 200 anos. Este trígono em Água é uma das primeiras colheitas reais desse ciclo — o que for construído agora com intenção genuína vai perdurar além do que qualquer planejamento consegue projetar. O que se consolida nesse período não aparece em indicadores econômicos. Aparece em vínculos.`,

  coletivo: `<strong style="opacity:.6">+</strong> Arte, música, cinema, literatura e espiritualidade produzindo obras que tocam o que é genuinamente humano — e encontrando audiência real. Movimentos de compaixão coletiva que saem do discurso e se organizam com sustentabilidade. Saúde integrativa, psicologia transpessoal e práticas contemplativas ganhando escala sem perder substância. O belo que tem alma impacta agora com força incomum.<br><br>

  oculto: `A qualidade do que está sendo gerado culturalmente e espiritualmente nesse período vai além do que qualquer métrica consegue capturar. O que nasce nas margens — os projetos pequenos, as práticas silenciosas, as comunidades sem barulho — carrega uma potência que só se revela depois. Pushya nutre sem aparecer. E o que Pushya nutre, cresce.`,
  indiv: `Júpiter em Pushya em trígono com Netuno em Uttara Bhadrapada é o aspecto que apoia o que você quer criar a partir do que tem de mais verdadeiro em si.<br><br>

function getHeavyDesc(pA, pB, funcType) {
  const key1 = pA.id+'_'+pB.id;
  const key2 = pB.id+'_'+pA.id;
  // Try typed key first (e.g. Saturno_Netuno_conj)
  const typed1 = key1+'_'+funcType;
  const typed2 = key2+'_'+funcType;
  if(EPHEM_STATE.year!==2026||EPHEM_STATE.ayanamsa!=='fagan-bradley')return null; // cards curados são específicos de 2026 FB
  return HEAVY_DESCS[typed1] || HEAVY_DESCS[typed2] || HEAVY_DESCS[key1] || HEAVY_DESCS[key2] || null;
}

function buildInfoCfg(asp, funcType) {
  const pA=asp.pA, pB=asp.pB;
  const sgA=getSign(pA,asp.exactDay), sgB=getSign(pB,asp.exactDay);
  const siA=SG[sgA]||{n:sgA||'?',sym:'',e:'',m:''};
  const siB=SG[sgB]||{n:sgB||'?',sym:'',e:'',m:''};
  const lvl=getLevel(asp);
  const exD=doyToDateFull(asp.exactDay);
  const startD=doyToDate(asp.startDay);
  const endD=doyToDate(asp.endDay);
  const dur=asp.endDay-asp.startDay+1;
  const metaA=`${pA.sym} ${siA.sym||''} ${siA.n||sgA||'?'} · ${siA.e||''} ${siA.m||''}`.trim();
  const metaB=`${pB.sym} ${siB.sym||''} ${siB.n||sgB||'?'} · ${siB.e||''} ${siB.m||''}`.trim();

  let desc = getHeavyDesc(pA, pB, funcType);
  if (!desc) {
    // Generic fallback
    const aspLabels={sq:'Quadratura',conj:'Conjunção',trine:'Trígono',opp:'Oposição',sext:'Sextil'};
    desc = {
      corpo: `${pA.n} e ${pB.n} em ${aspLabels[funcType]||funcType}. Dois arquétipos em relação — cada um trazendo sua essência para o campo de interação.`,
      momento: `O que esse encontro está revelando sobre a tensão ou a cooperação entre as forças de ${pA.n} e ${pB.n} na sua vida agora?`,
      coletivo: `${pA.n} e ${pB.n} em relação no coletivo — as forças que representam em diálogo ou em tensão em escala maior.`,
      indiv: `Observe onde as qualidades de ${pA.n} e ${pB.n} aparecem na sua experiência concreta nesse período.`,
      sombra: `Quando uma das duas forças domina sem integrar a outra — ou quando as duas operam sem consciência.`,
      integracao: `Trazer as duas energias para uma relação consciente — reconhecer o que cada uma tem a oferecer.`,
      luz: `A síntese que emerge quando ${pA.n} e ${pB.n} operam em harmonia consciente.`,
    };
  }

  const absA=getAbsDeg(pA.id, asp.exactDay);
  const absB=getAbsDeg(pB.id, asp.exactDay);
  const nakObjA=absA!==null?getNakshatra(absA):null;
  const nakObjB=absB!==null?getNakshatra(absB):null;
  const nakStrA=nakObjA?nakObjA.name+' · '+nakObjA.god:null;
  const nakStrB=nakObjB?nakObjB.name+' · '+nakObjB.god:null;

  return {
    aspSym: {sq:'□',conj:'☌',trine:'△',opp:'☍',sext:'⚹'}[funcType]||'·',
    aspLabel: {sq:'Quadratura · 90°',conj:'Conjunção · 0°',trine:'Trígono · 120°',opp:'Oposição · 180°',sext:'Sextil · 60°'}[funcType]||funcType,
    funcType,
    lvl, pA, pB, sgA, sgB, siA, siB,
    metaA, metaB,
    nakA: nakStrA,
    nakB: nakStrB,
    exactDay: asp.exactDay,
    exD, startD, endD, dur, desc
  };
}

    const transPlObj = PLANETS_MAP.find(p=>p.id===transPlId) || {id:transPlId,n:transPlId,sym:'?',col:'#888'};

    // Transit planet current sign (from ephemeris on dayIdx)
    const transDegAbs = getAbsDeg(transPlId, dayIdx);
    const transSgI = transDegAbs!==null ? Math.floor(((transDegAbs%360)+360)%360/30) : 0;
    const SG_KEYS=['ARI','TAU','GEM','CAN','LEO','VIR','LIB','SCO','SAG','CAP','AQU','PIS'];
    const sgA = SG_KEYS[transSgI];

    // Natal planet sign (fixed from natal degree)
    const natSgI = Math.floor(((natPl.deg%360)+360)%360/30);
    const sgB = SG_KEYS[natSgI];

    // Sign glossary objects
    const siA = SG[sgA]||{n:sgA,sym:'',e:'',m:''};
    const siB = SG[sgB]||{n:sgB,sym:'',e:'',m:''};

  function drawStarBadge(svg,x,y,sym,color,sz){
    const r=sz/2;
    const pts=[];
    for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);pts.push((x+r*Math.cos(a)).toFixed(2)+','+(y+r*Math.sin(a)).toFixed(2));}
    const hex=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    hex.setAttribute('points',pts.join(' '));
    hex.setAttribute('fill',color);hex.setAttribute('opacity','0.82');hex.setAttribute('stroke',color);hex.setAttribute('stroke-width','0.8');hex.setAttribute('pointer-events','none');
    svg.appendChild(hex);

    txt.setAttribute('x',x);txt.setAttribute('y',y+0.5);txt.setAttribute('text-anchor','middle');txt.setAttribute('dominant-baseline','middle');

  function drawAspectLayer(dataset, activePMap, color, strokeDash, badgeFn, clickFn, accentKey){
    // Period shading
    dataset.period.forEach(asp=>{
      const key=periodKey(asp);
      if(!activePMap.get(key)) return;
      const lvl=getLevel(asp);
      if(!showLevels[accentKey][lvl]) return;
      if(!periodLvlOk(lvl)) return;
      const yA=getY(asp.pA.id), yB=getY(asp.pB.id);
      if(!yA||!yB) return;
      const x1=pN(asp.startDay)*tW, x2=pN(asp.endDay)*tW;
      const xEx=pN(asp.exactDay)*tW;
      const topY=Math.min(yA.top,yB.top), botY=Math.max(yA.bot,yB.bot);
      const w2=Math.max(2,x2-x1);
      const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.style.cssText='position:absolute;left:0;top:0;width:100%;height:100%;overflow:visible;pointer-events:none';
      const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
      const gid='a'+accentKey+key.replace(/[^a-z0-9]/gi,'_');
      const grad=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
      grad.setAttribute('id',gid);grad.setAttribute('x1','0');grad.setAttribute('x2','1');
      const exPct=Math.max(5,Math.min(95,Math.round(((xEx-x1)/w2)*100)));
      const peakOp={1:'0.17',2:'0.11',3:'0.07'}[lvl]||'0.10';
      [['0%','0'],[exPct+'%',peakOp],['100%','0']].forEach(([off,op])=>{
        const s=document.createElementNS('http://www.w3.org/2000/svg','stop');
        s.setAttribute('offset',off);s.setAttribute('stop-color',color);s.setAttribute('stop-opacity',op);grad.appendChild(s);
      });
      defs.appendChild(grad);svg.appendChild(defs);
      const shade=document.createElementNS('http://www.w3.org/2000/svg','rect');
      shade.setAttribute('x',x1);shade.setAttribute('y',topY);shade.setAttribute('width',w2);shade.setAttribute('height',botY-topY);
      shade.setAttribute('fill','url(#'+gid+')');svg.appendChild(shade);
      ['left','right'].forEach(side=>{
        const lx=side==='left'?x1:x2;
        const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
        ln.setAttribute('x1',lx);ln.setAttribute('y1',topY);ln.setAttribute('x2',lx);ln.setAttribute('y2',botY);
        ln.setAttribute('stroke',color);ln.setAttribute('stroke-width',{1:'1.2',2:'0.9',3:'0.6'}[lvl]||'0.8');
        ln.setAttribute('stroke-dasharray',strokeDash[lvl]||'3,4');ln.setAttribute('stroke-opacity',{1:'0.5',2:'0.35',3:'0.22'}[lvl]);
        svg.appendChild(ln);
      });
      [[x1,doyToDate(asp.startDay),'start'],[x2,doyToDate(asp.endDay),'end']].forEach(([x,lbl,side])=>{
        const t=document.createElementNS('http://www.w3.org/2000/svg','text');
        t.setAttribute('x',side==='start'?x+3:x-3);t.setAttribute('y',botY+10);t.setAttribute('text-anchor',side==='start'?'start':'end');
        t.setAttribute('font-size',{1:'9',2:'8',3:'7'}[lvl]||'8');t.setAttribute('fill',color);t.setAttribute('font-family','Courier New,monospace');
        t.setAttribute('opacity',{1:'0.75',2:'0.6',3:'0.45'}[lvl]);t.setAttribute('pointer-events','none');t.textContent=lbl;svg.appendChild(t);
      });
      aspSvg.appendChild(svg);
    });
    // Exact lines + click
    dataset.exact.forEach(asp=>{
      const lvl=getLevel(asp);
      if(!showLevels[accentKey][lvl]) return;
      const sz=badgeSz(lvl); const lw=lineW(lvl); const lo=lineOp(lvl);
      const yA=getY(asp.pA.id), yB=getY(asp.pB.id);
      if(!yA||!yB) return;

      svg.style.cssText='position:absolute;left:0;top:0;width:100%;height:100%;overflow:visible;pointer-events:none';

      line.setAttribute('x1',xEx);line.setAttribute('y1',yA.cy+yA.bh);line.setAttribute('x2',xEx);line.setAttribute('y2',yB.cy-yB.bh);
      line.setAttribute('stroke',color);line.setAttribute('stroke-width',lw);line.setAttribute('stroke-opacity',lo);
      svg.appendChild(line);
      badgeFn(svg,xEx,yA.cy,asp.pB.sym,color,sz);

      div.title=asp.pA.n+' '+accentKey+' '+asp.pB.n;

      function handleClick(e){e.stopPropagation();e.preventDefault();clickFn(_asp,activePMap,periodKey);}
      div.addEventListener('click',handleClick);div.addEventListener('touchend',handleClick,{passive:false});
      div.classList.add('asp-hit');document.getElementById('gantt-inner').appendChild(div);
    });
  }

  // ── OPPOSITIONS ──────────────────────────────────────────────
  drawAspectLayer(

    activeOppsPeriods,
    '#cc8800',

  // ── SEXTILES ─────────────────────────────────────────────────
  drawAspectLayer(
    {period:sextsPeriod, exact:sextsExact},
    activeSextsPeriods,
    '#1899bb',
    {1:'4,3',2:'3,4',3:'2,5'},
    drawStarBadge,
    (asp,map,pk)=>{
      const key=pk(asp); const was=map.get(key);
      if(was) map.delete(key); else map.set(key,true);
      infoPanel.style.display='none'; conjPanel.style.display='none'; trinePanel.style.display='none'; oppPanel.style.display='none';
      showSextInfo(asp); sR();

  // ── ASPECTOS DA LUA (apenas mensal/quinzenal) ─────────────────
  const ppd2=tW/TOT;
  const luaVisible2=isDetailZoom()&&active['Lua']!==false&&(!activePeriodView||(activePeriodView.days<=30));
  if(luaVisible2){
    const yLua=getY('Lua');
    if(yLua){
      const LUA_COLORS={conj:'#3355cc',sq:'#cc0000',trine:'#1a8840',opp:'#aa6600',sext:'#0f6680'};
      const LUA_STROKES={conj:'2,3',sq:'3,3',trine:'3,4',opp:'4,3',sext:'2,4'};
      function luaBadgeFn(type){
        if(type==='conj') return drawCircleBadge;
        if(type==='sq')   return drawBadge;
        if(type==='trine')return drawTriangleBadge;
        if(type==='opp')  return drawDiamondBadge;
        if(type==='sext') return drawStarBadge;
        return drawCircleBadge;

      luaAspPeriod.forEach(asp=>{

        if(!yOther||!yLua) return;
        const luaLvl=isEcl?1:(_SLOW.includes(otherId)?2:3);
        if(!showLevels[asp.type]||!showLevels[asp.type][luaLvl]) return;
        if(!periodLvlOk(luaLvl)) return;
        const col=isEcl?(eclipseType(asp)==='solar'?'#cc6600':'#4422aa'):(LUA_COLORS[asp.type]||'#8899bb');
        const x1=pN(asp.startDay)*tW, x2=pN(asp.endDay)*tW;
        const xEx=pN(asp.exactDay)*tW;
        const topY=Math.min(yLua.top,yOther.top), botY=Math.max(yLua.bot,yOther.bot);
        const w2=Math.max(2,x2-x1);
        const svgL=document.createElementNS('http://www.w3.org/2000/svg','svg');
        svgL.style.cssText='position:absolute;left:0;top:0;width:100%;height:100%;overflow:visible;pointer-events:none';
        const defsL=document.createElementNS('http://www.w3.org/2000/svg','defs');
        const gidL='lua'+k.replace(/[^a-z0-9]/gi,'_');
        const gradL=document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
        gradL.setAttribute('id',gidL);gradL.setAttribute('x1','0');gradL.setAttribute('x2','1');
        const exPctL=Math.max(5,Math.min(95,w2>0?Math.round(((xEx-x1)/w2)*100):50));
        const peakOpL={1:'0.22',2:'0.15',3:'0.09'}[luaLvl]||'0.12';
        [['0%','0'],[exPctL+'%',peakOpL],['100%','0']].forEach(([off,op])=>{
          const s=document.createElementNS('http://www.w3.org/2000/svg','stop');
          s.setAttribute('offset',off);s.setAttribute('stop-color',col);s.setAttribute('stop-opacity',op);gradL.appendChild(s);
        });
        defsL.appendChild(gradL);svgL.appendChild(defsL);
        const shadeL=document.createElementNS('http://www.w3.org/2000/svg','rect');
        shadeL.setAttribute('x',x1);shadeL.setAttribute('y',topY);shadeL.setAttribute('width',w2);shadeL.setAttribute('height',botY-topY);
        shadeL.setAttribute('fill','url(#'+gidL+')');svgL.appendChild(shadeL);
        ['left','right'].forEach(side=>{
          const lx=side==='left'?x1:x2;
          const ln=document.createElementNS('http://www.w3.org/2000/svg','line');

      });

      luaAspExact.forEach(asp=>{
        const isEcl=isEclipse(asp);
        const eType=isEcl?eclipseType(asp):null;
        const otherId=asp.pA.id==='Lua'?asp.pB.id:asp.pA.id;
        const otherPl=asp.pA.id==='Lua'?asp.pB:asp.pA;

        if(!showLevels[asp.type]||!showLevels[asp.type][luaLvl]) return;
        const sz=isEcl?badgeSz(1):badgeSz(luaLvl);
        const lw=isEcl?2.2:lineW(luaLvl);
        const lo=isEcl?0.9:lineOp(luaLvl);
        const xEx=pN(asp.exactDay)*tW;
        const eclColor=isEcl?(eType==='solar'?'#cc6600':'#4422aa'):(LUA_COLORS[asp.type]||'#8899bb');

        const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');

        line.setAttribute('x1',xEx);line.setAttribute('y1',yTop+yLua.bh);
        line.setAttribute('x2',xEx);line.setAttribute('y2',yBot-yOther.bh);
        line.setAttribute('stroke',baseColor);line.setAttribute('stroke-width',lw);
        line.setAttribute('stroke-dasharray',isEcl?'none':(LUA_STROKES[asp.type]||'2,3'));
        line.setAttribute('stroke-opacity',lo);
        svg.appendChild(line);
        if(isEcl){
          const halo=document.createElementNS('http://www.w3.org/2000/svg','circle');
          halo.setAttribute('cx',xEx);halo.setAttribute('cy',yLua.cy);
          halo.setAttribute('r',sz+5);halo.setAttribute('fill','none');
          halo.setAttribute('stroke',baseColor+'aa');halo.setAttribute('stroke-width','1.5');
          halo.setAttribute('stroke-dasharray','2,2');svg.appendChild(halo);
          drawCircleBadge(svg,xEx,yLua.cy,'☽',baseColor,sz);
          const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
          lbl.setAttribute('x',xEx+sz+3);lbl.setAttribute('y',yLua.cy-sz-2);
          lbl.setAttribute('font-size','7');lbl.setAttribute('fill',baseColor);
          lbl.setAttribute('font-family','Courier New,monospace');lbl.setAttribute('font-weight','700');
          lbl.setAttribute('opacity','0.9');lbl.setAttribute('pointer-events','none');
          lbl.textContent=(eType==='solar'?'☀ SOLAR':'☾ LUNAR');svg.appendChild(lbl);
          luaBadgeFn(asp.type)(svg,xEx,yOther.cy,'☽',baseColor,sz);
        } else {
          luaBadgeFn(asp.type)(svg,xEx,yLua.cy,otherPl.sym,baseColor,sz);
          luaBadgeFn(asp.type)(svg,xEx,yOther.cy,'☽',baseColor,sz);
        }
        aspSvg.appendChild(svg);
        const tapX=12,hitH=Math.max(40,Math.abs(yBot-yTop)+sz*2);
        const div=document.createElement('div');
        div.style.cssText='position:absolute;left:'+(xEx-sz/2-tapX)+'px;top:'+(yTop-tapX)+'px;width:'+(sz+tapX*2)+'px;height:'+(hitH+tapX*2)+'px;cursor:pointer;z-index:21;pointer-events:auto;border-radius:6px';
        div.addEventListener('click',e=>{
          e.stopPropagation();e.preventDefault();
          const k=periodKey(asp);
          activeLuaAspPeriods.has(k)?activeLuaAspPeriods.delete(k):activeLuaAspPeriods.set(k,true);
          showLuaAspCard(asp);sR();
        });
        div.addEventListener('touchend',e=>{
          e.stopPropagation();e.preventDefault();
          const k=periodKey(asp);
          activeLuaAspPeriods.has(k)?activeLuaAspPeriods.delete(k):activeLuaAspPeriods.set(k,true);
          showLuaAspCard(asp);sR();
        },{passive:false});
        div.classList.add('asp-hit');
        document.getElementById('gantt-inner').appendChild(div);
      });
    }
  }
}

        const dayIdx=Math.round(pct*365);

          // Check: is planet getting closer on day 1 vs day 2? If moving away, skip
          const d0=angDiff(plDegs[0],targetDeg),d1=angDiff(plDegs[1],targetDeg);
          if(d1>d0) return; // moving away from target on day 1 → peak was in prev year
        }
        if(dayIdx>=363){
          const d363=angDiff(plDegs[362],targetDeg),d364=angDiff(plDegs[363],targetDeg);
          if(d364>d363) return; // moving away on last day → peak in next year
        }
        badgeList.push({np,asp,lvl,pct,dayIdx,targetDeg});
      });
    });

    // ── Sort by x position ──────────────────────────────────────────
    badgeList.sort((a,b)=>a.pct-b.pct);

    // ── Group badges into date clusters ─────────────────────────────
    const CLUSTER_PX = 14;
    const clusters = [];
    badgeList.forEach(b=>{
      b.x = b.pct * trackPx;
      const last = clusters[clusters.length-1];
      if(last && b.x - last.anchorX <= CLUSTER_PX){
        last.badges.push(b);
        last.anchorX = last.badges.reduce((s,bb)=>s+bb.x,0)/last.badges.length;
      } else {
        clusters.push({anchorX:b.x, badges:[b]});
      }
    });

    // ── Draw clusters — badge straddles the boundary (y=22) between sign bar and house bar ──
    // Badge centred on y=22 (the dividing line): top half in sign bar, bottom half in house bar
    const SZ = 18;       // badge diameter
    const FSZ = 9;       // aspect symbol font size
    const GAP = 2;       // gap between badges in a cluster
    const BOUNDARY = 0; // y=0 = top of house track SVG = DOM boundary with planet row above
    // overflow:visible on SVG allows negative y → badge invades planet bar above
    const PILL_W = 30, PILL_H = 16, PILL_R = 4, PILL_GAP = 4;
    const SG_SYM2 = ['♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓'];

    clusters.forEach(cl=>{
      const ax = cl.anchorX;
      const n  = cl.badges.length;
      const totalW = n*SZ + (n-1)*GAP;
      const startX = ax - totalW/2;
      const by = BOUNDARY;

      // Pre-compute badge x positions
      const bxArr = cl.badges.map((_,bi) => startX + bi*(SZ+GAP) + SZ/2);

      // Pre-compute pill x positions — distributed side by side centred on cluster anchor
      const totalPillW = n*PILL_W + (n-1)*PILL_GAP;
      const pillStartX = ax - totalPillW/2;
      const pillXArr = cl.badges.map((_,bi) => pillStartX + bi*(PILL_W+PILL_GAP) + PILL_W/2);

      const h = SZ/2;
      const lblY = by + h + 18; // pill vertical position (can overflow house bar)
      const pillTop = lblY - PILL_H + 3;
      const pillMidY = pillTop + PILL_H/2; // vertical centre of pill for connector line

      cl.badges.forEach((b,bi)=>{
        const bx = bxArr[bi];
        const px = pillXArr[bi]; // pill centre x — independent of badge x

        // ── Shape centred on boundary ──
        let shape;
        if(b.asp.shape==='circle'){
          shape=document.createElementNS('http://www.w3.org/2000/svg','circle');
          shape.setAttribute('cx',bx); shape.setAttribute('cy',by); shape.setAttribute('r',h);
        } else if(b.asp.shape==='square'){
          shape=document.createElementNS('http://www.w3.org/2000/svg','rect');
          shape.setAttribute('x',bx-h); shape.setAttribute('y',by-h);
          shape.setAttribute('width',SZ); shape.setAttribute('height',SZ);
          shape.setAttribute('rx','1.5');
        } else if(b.asp.shape==='triangle'){
          shape=document.createElementNS('http://www.w3.org/2000/svg','polygon');
          shape.setAttribute('points',`${bx},${by-h} ${bx+h},${by+h} ${bx-h},${by+h}`);
        } else if(b.asp.shape==='diamond'){
          shape=document.createElementNS('http://www.w3.org/2000/svg','polygon');
          shape.setAttribute('points',`${bx},${by-h} ${bx+h},${by} ${bx},${by+h} ${bx-h},${by}`);
        } else {
          const pts=[];
          for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;pts.push((bx+h*Math.cos(a)).toFixed(1)+','+(by+h*Math.sin(a)).toFixed(1));}
          shape=document.createElementNS('http://www.w3.org/2000/svg','polygon');
          shape.setAttribute('points',pts.join(' '));
        }
        shape.setAttribute('fill',b.asp.color);
        shape.setAttribute('opacity',b.lvl===1?'0.92':b.lvl===2?'0.80':'0.65');
        shape.setAttribute('pointer-events','none');
        svg.appendChild(shape);

        // ── Aspect symbol inside badge ──
        const aspTxt=document.createElementNS('http://www.w3.org/2000/svg','text');
        aspTxt.setAttribute('x',bx);
        aspTxt.setAttribute('y',by+(b.asp.shape==='triangle'?2:0.5));
        aspTxt.setAttribute('text-anchor','middle');
        aspTxt.setAttribute('dominant-baseline','middle');
        aspTxt.setAttribute('font-size',FSZ);
        aspTxt.setAttribute('fill','#fff');
        aspTxt.setAttribute('font-family','Noto Sans Symbols 2,Georgia,serif');
        aspTxt.setAttribute('font-weight','bold');
        aspTxt.setAttribute('pointer-events','none');
        aspTxt.textContent=b.asp.sym;
        svg.appendChild(aspTxt);

        // ── Connector line: badge bottom → pill top ──
        // Only draw if pill is offset from badge (would overlap otherwise)
        if(Math.abs(px - bx) > 2){
          const line=document.createElementNS('http://www.w3.org/2000/svg','line');
          line.setAttribute('x1',bx); line.setAttribute('y1',by+h);
          line.setAttribute('x2',px); line.setAttribute('y2',pillTop);
          line.setAttribute('stroke',b.np.col);
          line.setAttribute('stroke-width','0.8');
          line.setAttribute('stroke-dasharray','2,2');
          line.setAttribute('opacity','0.45');
          line.setAttribute('pointer-events','none');
          svg.appendChild(line);
        }

        // ── Pill background ──
        const natSgIdx = Math.floor(((b.np.deg%360)+360)%360/30);
        const pill=document.createElementNS('http://www.w3.org/2000/svg','rect');
        pill.setAttribute('x', px - PILL_W/2);
        pill.setAttribute('y', pillTop);
        pill.setAttribute('width', PILL_W);
        pill.setAttribute('height', PILL_H);
        pill.setAttribute('rx', PILL_R);
        pill.setAttribute('fill','rgba(248,245,238,0.95)');
        pill.setAttribute('stroke', b.np.col);
        pill.setAttribute('stroke-width','0.8');
        pill.setAttribute('pointer-events','none');
        svg.appendChild(pill);

        // ── Planet symbol (left of pill centre) ──
        const plSym=document.createElementNS('http://www.w3.org/2000/svg','text');
        plSym.setAttribute('x', px - 7);
        plSym.setAttribute('y', lblY - 2);
        plSym.setAttribute('text-anchor','middle');
        plSym.setAttribute('dominant-baseline','auto');
        plSym.setAttribute('font-size', 11);
        plSym.setAttribute('fill', b.np.col);
        plSym.setAttribute('font-family','Noto Sans Symbols 2,Georgia,serif');
        plSym.setAttribute('font-weight','700');
        plSym.setAttribute('pointer-events','none');
        plSym.textContent = b.np.sym;
        svg.appendChild(plSym);

        // ── Sign symbol (right of pill centre) ──
        const sgSym=document.createElementNS('http://www.w3.org/2000/svg','text');
        sgSym.setAttribute('x', px + 7);
        sgSym.setAttribute('y', lblY - 2);
        sgSym.setAttribute('text-anchor','middle');
        sgSym.setAttribute('dominant-baseline','auto');
        sgSym.setAttribute('font-size', 11);
        sgSym.setAttribute('fill', b.np.col);
        sgSym.setAttribute('font-family','Noto Sans Symbols 2,Georgia,serif');
        sgSym.setAttribute('font-weight','700');
        sgSym.setAttribute('pointer-events','none');
        sgSym.textContent = SG_SYM2[natSgIdx];
        svg.appendChild(sgSym);

        // ── Click hit area on badge — opens natal aspect card ──
        const hitW=SZ+8, hitH=SZ+PILL_H+28;
        const hit=document.createElementNS('http://www.w3.org/2000/svg','rect');
        hit.setAttribute('x', Math.min(bx,px)-hitW/2);
        hit.setAttribute('y', by-h-4);
        hit.setAttribute('width', Math.abs(px-bx)+hitW);
        hit.setAttribute('height', hitH);
        hit.setAttribute('fill','transparent');
        hit.setAttribute('cursor','pointer');
        hit.style.pointerEvents='all';
        // Capture for closure
        const _plId=plId, _np=b.np, _asp=b.asp, _day=b.dayIdx;
        hit.addEventListener('click', e=>{
          e.stopPropagation();
          showNatalAspCard(_plId, _np, _asp, _day);
        });
        hit.addEventListener('mouseenter', e=>{
          const natSgName=['Áries','Touro','Gêmeos','Câncer','Leão','Virgem','Libra','Escorpião','Sagitário','Capricórnio','Aquário','Peixes'];
          tip.innerHTML=`<div class="t1"><span class="sym">${_plId}</span> ${_asp.sym} <span class="sym">${_np.sym}</span> ${_np.id} natal</div>`+
            `<div class="t2">${_asp.type==='sq'?'Quadratura':_asp.type==='conj'?'Conjunção':_asp.type==='trine'?'Trígono':_asp.type==='opp'?'Oposição':'Sextil'} · ${natSgName[natSgIdx]} natal · Casa ${_np.h}</div>`+
            `<div style="color:#aaa;font-size:13.5px;margin-top:3px">Clique para abrir o card</div>`;
          tip.style.display='block';
          tip.style.left=Math.min(e.clientX+12,window.innerWidth-180)+'px';
          tip.style.top=Math.max(e.clientY-40,4)+'px';
        });
        hit.addEventListener('mouseleave',()=>{tip.style.display='none';});
        svg.appendChild(hit);
      });
    });

    // ── Approaching badges — planet in field but won't be exact in 2026 ──────
    // Rendered separately: dashed outline, low opacity, "~YYYY" label
    const SKIP_IDS_AP=['MC'];
    NAT_PL.forEach(np=>{
      if(SKIP_IDS_AP.includes(np.id)) return;
      const lvl=getAspLevel(plId,np.id);
      if(!periodLvlOk(lvl)) return;
      ASP_DEFS.forEach(asp=>{
        if(!showLevels[asp.type]||!showLevels[asp.type][lvl]) return;
        const targetDeg=((np.deg+asp.offset)%360+360)%360;
        // Only show approaching if exact crossing doesn't exist
        if(plDegPct(targetDeg)>=0) return;
        const appr=plApproaching(targetDeg);
        if(!appr) return;

        const bx=appr.pct*trackPx;
        const by2=BOUNDARY; // same position as exact badges — lower edge of sign bar
        const h=SZ/2;

        // Dashed outline shape centred on boundary — hollow + dashed
        let apShape;
        if(asp.shape==='circle'){
          apShape=document.createElementNS('http://www.w3.org/2000/svg','circle');
          apShape.setAttribute('cx',bx); apShape.setAttribute('cy',by2); apShape.setAttribute('r',h);
        } else if(asp.shape==='square'){
          apShape=document.createElementNS('http://www.w3.org/2000/svg','rect');
          apShape.setAttribute('x',bx-h); apShape.setAttribute('y',by2-h);
          apShape.setAttribute('width',SZ); apShape.setAttribute('height',SZ);
          apShape.setAttribute('rx','1.5');
        } else if(asp.shape==='triangle'){
          apShape=document.createElementNS('http://www.w3.org/2000/svg','polygon');
          apShape.setAttribute('points',`${bx},${by2-h} ${bx+h},${by2+h} ${bx-h},${by2+h}`);
        } else if(asp.shape==='diamond'){
          apShape=document.createElementNS('http://www.w3.org/2000/svg','polygon');
          apShape.setAttribute('points',`${bx},${by2-h} ${bx+h},${by2} ${bx},${by2+h} ${bx-h},${by2}`);
        } else {
          const pts=[];
          for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;pts.push((bx+h*Math.cos(a)).toFixed(1)+','+(by2+h*Math.sin(a)).toFixed(1));}
          apShape=document.createElementNS('http://www.w3.org/2000/svg','polygon');
          apShape.setAttribute('points',pts.join(' '));
        }
        apShape.setAttribute('fill','none');
        apShape.setAttribute('stroke',asp.color);
        apShape.setAttribute('stroke-width','1.5');
        apShape.setAttribute('stroke-dasharray','3,2');
        apShape.setAttribute('opacity','0.55');
        apShape.setAttribute('pointer-events','none');
        svg.appendChild(apShape);

        // Aspect symbol inside approaching badge — faded colour (not white, badge is hollow)
        const apTxt=document.createElementNS('http://www.w3.org/2000/svg','text');
        apTxt.setAttribute('x',bx); apTxt.setAttribute('y',by2+(asp.shape==='triangle'?2:0.5));
        apTxt.setAttribute('text-anchor','middle'); apTxt.setAttribute('dominant-baseline','middle');
        apTxt.setAttribute('font-size',FSZ-1); apTxt.setAttribute('fill',asp.color);
        apTxt.setAttribute('font-family','Noto Sans Symbols 2,Georgia,serif');
        apTxt.setAttribute('font-weight','bold'); apTxt.setAttribute('opacity','0.7');
        apTxt.setAttribute('pointer-events','none');
        apTxt.textContent=asp.sym;
        svg.appendChild(apTxt);

        // Natal planet + natal sign — pill background, spaced symbols
        const natSgIdxAp=Math.floor(((np.deg%360)+360)%360/30);
        const apLblY=by2+h+18;
        const apPillW=28, apPillH=16, apPillR=4;
        const apPill=document.createElementNS('http://www.w3.org/2000/svg','rect');
        apPill.setAttribute('x',bx-apPillW/2); apPill.setAttribute('y',apLblY-apPillH+3);
        apPill.setAttribute('width',apPillW); apPill.setAttribute('height',apPillH);
        apPill.setAttribute('rx',apPillR);
        apPill.setAttribute('fill','rgba(248,245,238,0.85)');
        apPill.setAttribute('stroke',np.col); apPill.setAttribute('stroke-width','0.8');
        apPill.setAttribute('stroke-dasharray','3,2');
        apPill.setAttribute('opacity','0.85'); apPill.setAttribute('pointer-events','none');
        svg.appendChild(apPill);
        const apPlSym=document.createElementNS('http://www.w3.org/2000/svg','text');
        apPlSym.setAttribute('x',bx-7); apPlSym.setAttribute('y',apLblY-2);
        apPlSym.setAttribute('text-anchor','middle'); apPlSym.setAttribute('dominant-baseline','auto');
        apPlSym.setAttribute('font-size',11); apPlSym.setAttribute('fill',np.col);
        apPlSym.setAttribute('font-family','Noto Sans Symbols 2,Georgia,serif');
        apPlSym.setAttribute('font-weight','700'); apPlSym.setAttribute('opacity','0.75');
        apPlSym.setAttribute('pointer-events','none'); apPlSym.textContent=np.sym;
        svg.appendChild(apPlSym);
        const apSgSym=document.createElementNS('http://www.w3.org/2000/svg','text');
        apSgSym.setAttribute('x',bx+7); apSgSym.setAttribute('y',apLblY-2);
        apSgSym.setAttribute('text-anchor','middle'); apSgSym.setAttribute('dominant-baseline','auto');

        apSgSym.setAttribute('font-family','Noto Sans Symbols 2,Georgia,serif');
        apSgSym.setAttribute('font-weight','700'); apSgSym.setAttribute('opacity','0.75');
        apSgSym.setAttribute('pointer-events','none'); apSgSym.textContent=SG_SYM2[natSgIdxAp];
        svg.appendChild(apSgSym);
        // Line 2: year estimate
        const apYr=document.createElementNS('http://www.w3.org/2000/svg','text');
        apYr.setAttribute('x',bx); apYr.setAttribute('y',apLblY+9);
        apYr.setAttribute('text-anchor','middle'); apYr.setAttribute('dominant-baseline','auto');
        apYr.setAttribute('font-size',6); apYr.setAttribute('fill',asp.color);
        apYr.setAttribute('font-family','Courier New,monospace'); apYr.setAttribute('opacity','0.65');
        apYr.setAttribute('pointer-events','none');
        apYr.textContent='~'+appr.estYear;
        svg.appendChild(apYr);

        // Invisible hit area for tooltip
        const apHit=document.createElementNS('http://www.w3.org/2000/svg','rect');
        apHit.setAttribute('x',bx-h-4); apHit.setAttribute('y',by2-h-4);
        apHit.setAttribute('width',SZ+8); apHit.setAttribute('height',SZ+16);
        apHit.setAttribute('fill','transparent'); apHit.setAttribute('cursor','help');
        apHit.style.pointerEvents='all';
        const natSgI=Math.floor(((np.deg%360)+360)%360/30);
        const natDegLocal=(((np.deg%30)+30)%30).toFixed(1);
        const tDegAp=(plDegs[Math.min(appr.day,364)]||0);
        const tSgI=Math.floor(((tDegAp%360)+360)%360/30);
        const SG_PT2=['Áries','Touro','Gêmeos','Câncer','Leão','Virgem','Libra','Escorpião','Sagitário','Capricórnio','Aquário','Peixes'];
        apHit.setAttribute('title',
          `${plId} ${asp.sym} ${np.id} natal\nAspecto se formando — exatidão estimada ~${appr.estYear}\n`+
          `${plId} em ${SG_PT2[tSgI]} · ${np.id} natal em ${natDegLocal}° ${SG_PT2[natSgI]}\n`+
          `Distância atual: ${appr.dist.toFixed(1)}° do exato\n`+
          `(Dados precisos na Fase 2 — Swiss Ephemeris)`
        );
        apHit.addEventListener('mouseenter',e=>{
          tip.innerHTML=
            `<div class="t1"><span class="sym">${plId}</span> ${asp.sym} <span class="sym">${np.sym}</span> ${np.id} natal</div>`+
            `<div class="t2" style="color:${asp.color};font-style:italic">Aspecto se formando ↗</div>`+
            `<div class="t2">${plId} em ${SG_PT2[tSgI]} · ${np.id} natal em ${natDegLocal}° ${SG_PT2[natSgI]}</div>`+
            `<div style="color:#888;font-size:13.5px;margin-top:3px">Distância atual: <b>${appr.dist.toFixed(1)}°</b> do exato</div>`+
            `<div style="color:#c8a028;font-size:13.5px;margin-top:2px">⏳ Exatidão estimada: <b>~${appr.estYear}</b></div>`+
            `<div style="color:#aaa;font-size:12px;font-style:italic;margin-top:3px">Datas precisas na Fase 2 · Swiss Ephemeris</div>`;
          tip.style.display='block';
          const r=svg.getBoundingClientRect();
          tip.style.left=Math.min(e.clientX+12,window.innerWidth-180)+'px';
          tip.style.top=Math.max(e.clientY-40,4)+'px';
        });
        apHit.addEventListener('mouseleave',()=>{tip.style.display='none';});
        svg.appendChild(apHit);
      });
    });
  });

}

  // JD for Jan 1 2026 00:00 UTC = 2461042.5, +dayOfYear-1 days
  const JD=2461042.5+(dayOfYear-1);
  const T=(JD-2451545.0)/36525;
  // GMST in degrees
  let GMST=280.46061837+360.98564736629*(JD-2451545.0)+0.000387933*T*T-T*T*T/38710000;
  GMST=((GMST%360)+360)%360;
  const RAMC=GMST; // Long=0°E, LMST=GMST
  const eps=(23.4393-0.0130*T)*Math.PI/180; // obliquity rad
  const ramcR=RAMC*Math.PI/180;
  const lat=0; // equator

  // ASC (tropical)
  let ascTrop=(Math.atan2(-Math.cos(ramcR), Math.sin(eps)*Math.tan(lat)+Math.cos(eps)*Math.sin(ramcR))*180/Math.PI+360)%360;
  // MC (tropical)
  let mcTrop=(Math.atan2(Math.sin(ramcR),Math.cos(ramcR)*Math.cos(eps))*180/Math.PI+360)%360;

  // Fagan-Bradley ayanamsa (approximate for 2026)
  const ayanamsa=25.0667;
  const ASC=((ascTrop-ayanamsa)+360)%360; // sideral
  const MC=((mcTrop-ayanamsa)+360)%360;   // sideral

  // For lat=0: Regiomontanus cusps are equally spaced 30° from ASC
  // (at equator all house systems converge)
  const cusps=[];
  for(let h=0;h<12;h++) cusps.push(((ASC+h*30)%360));
  // H10=MC (override)
  cusps[9]=MC; cusps[3]=((MC+180)%360); // IC

  // ── SVG SETUP ─────────────────────────────────────────────────
  const S=500; const cx=S/2,cy=S/2;
  const R={
    outerRim:  S*0.494,
    zodiacOut: S*0.458,
    zodiacIn:  S*0.376,
    planetRing:S*0.330,
    aspCircle: S*0.268,
    houseIn:   S*0.175,
    center:    S*0.088,
  };

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox',`0 0 ${S} ${S}`);
  svg.style.cssText='width:100%;height:100%;display:block';

  // ── GEOMETRY ──────────────────────────────────────────────────
  // Convention: ASC at 9 o'clock (left, 180° SVG)
  // Zodiac counter-clockwise (increasing degrees go CCW)
  // toXY(absDeg, r): converts sideral zodiac degree to SVG x,y
  //   svgAngle = (ASC - absDeg + 180) mod 360 → CCW layout with ASC at left
  function toXY(absDeg, r){
    const a=((ASC-absDeg+180+360)%360)*Math.PI/180;
    return {x:+(cx+r*Math.cos(a)).toFixed(2), y:+(cy-r*Math.sin(a)).toFixed(2)};
  }
  // Sector path (CCW, no large arc since 30°)
  function sector(rOut,rIn,dStart,dEnd){
    const s1=toXY(dStart,rOut),e1=toXY(dEnd,rOut);
    const s2=toXY(dEnd,rIn), e2=toXY(dStart,rIn);
    // CCW: sweep-flag=0 from dStart to dEnd (going counter-clockwise in astro = clockwise in SVG y-flipped)
    return `M${s1.x},${s1.y} A${rOut},${rOut} 0 0 1 ${e1.x},${e1.y} L${s2.x},${s2.y} A${rIn},${rIn} 0 0 0 ${e2.x},${e2.y} Z`;
  }
  function circ(r,fill,stroke,sw){
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',r);
    c.setAttribute('fill',fill||'none');
    if(stroke){c.setAttribute('stroke',stroke);c.setAttribute('stroke-width',sw||'1');}
    return c;
  }
  function line(x1,y1,x2,y2,stroke,sw,dash){
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke',stroke||'#aaa');l.setAttribute('stroke-width',sw||'1');
    if(dash) l.setAttribute('stroke-dasharray',dash);
    return l;
  }
  function text(x,y,txt,fs,fill,font,anchor,baseline,weight){
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',x);t.setAttribute('y',y);t.textContent=txt;
    t.setAttribute('font-size',fs||'10');t.setAttribute('fill',fill||'#555');
    t.setAttribute('font-family',font||'Inter,sans-serif');
    t.setAttribute('text-anchor',anchor||'middle');
    t.setAttribute('dominant-baseline',baseline||'middle');
    if(weight) t.setAttribute('font-weight',weight);
    return t;
  }

  // ── BACKGROUND ────────────────────────────────────────────────
  svg.appendChild(circ(R.outerRim,'#f8f7f2','#bbb','1'));
  svg.appendChild(circ(R.zodiacIn,'#eeecea','#ccc','0.5'));

  // ── ZODIAC BAND ───────────────────────────────────────────────
  const EFILL={FOGO:'rgba(210,70,30,.13)',TERRA:'rgba(50,130,50,.13)',AR:'rgba(30,130,190,.13)',AGUA:'rgba(50,70,170,.13)'};
  const ESTK={FOGO:'rgba(200,60,30,.45)',TERRA:'rgba(50,120,50,.45)',AR:'rgba(30,120,180,.45)',AGUA:'rgba(50,60,160,.45)'};
  const SCOL={ARI:'#cc3020',TAU:'#4a7a35',GEM:'#b07e0a',CAN:'#2a55aa',LEO:'#cc4010',VIR:'#4a7040',LIB:'#6644aa',SCO:'#992030',SAG:'#bb4400',CAP:'#445566',AQU:'#2060aa',PIS:'#4455aa'};

  SIGNS_ORDER.forEach((sk,i)=>{
    const sg=SG[sk];
    const d0=i*30, d1=i*30+30;
    // sector
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',sector(R.zodiacOut,R.zodiacIn,d0,d1));
    p.setAttribute('fill',EFILL[sg.e]||'rgba(128,128,128,.1)');
    p.setAttribute('stroke',ESTK[sg.e]||'rgba(128,128,128,.3)');
    p.setAttribute('stroke-width','0.4');
    svg.appendChild(p);
    // glyph
    const mid=toXY(i*30+15,(R.zodiacOut+R.zodiacIn)/2);
    svg.appendChild(text(mid.x,mid.y,sg.sym,'16',SCOL[sk],'Noto Sans Symbols 2,Segoe UI Symbol,Apple Symbols,serif'));
  });

  // Zodiac borders
  svg.appendChild(circ(R.zodiacOut,'none','#999','1'));
  svg.appendChild(circ(R.zodiacIn,'none','#bbb','0.6'));

  // Degree marks (every 5°, from zodiac outward)
  for(let d=0;d<360;d+=5){
    const isSgn=d%30===0, is10=d%10===0;
    const r2=isSgn?R.zodiacIn:is10?R.zodiacOut-10:R.zodiacOut-5;
    const p1=toXY(d,R.zodiacOut),p2=toXY(d,r2);
    svg.appendChild(line(p1.x,p1.y,p2.x,p2.y,isSgn?'#888':is10?'#bbb':'#ddd',isSgn?'1.2':is10?'0.7':'0.5'));
  }

  // ── HOUSE LINES ───────────────────────────────────────────────
  svg.appendChild(circ(R.houseIn,'none','#ccc','0.6'));
  const HLBL=['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII'];
  cusps.forEach((csp,h)=>{
    const isAng=h%3===0;
    const p1=toXY(csp,R.zodiacIn),p2=toXY(csp,R.houseIn);
    svg.appendChild(line(p1.x,p1.y,p2.x,p2.y,isAng?'#666':'#ccc',isAng?'1.3':'0.6',isAng?null:'2,4'));
    // House number in middle of house
    const midHouse=((csp+(cusps[(h+1)%12]-csp+360)%360/2)%360);
    const hPos=toXY(midHouse,(R.houseIn+R.aspCircle)/2+22);
    svg.appendChild(text(hPos.x,hPos.y,HLBL[h],'9','#bbb','Georgia,serif','middle','middle','600'));
  });

  // ── ASC / MC / DSC / IC AXES ──────────────────────────────────
  const AXLBLS=[
    {deg:ASC,lbl:'ASC',col:'#666'},{deg:(ASC+180)%360,lbl:'DSC',col:'#666'},
    {deg:MC,  lbl:'MC', col:'#666'},{deg:(MC+180)%360, lbl:'IC', col:'#666'},
  ];
  AXLBLS.forEach(ax=>{
    const p1=toXY(ax.deg,R.outerRim+2),p2=toXY(ax.deg,R.houseIn);
    svg.appendChild(line(p1.x,p1.y,p2.x,p2.y,ax.col,'1.5'));
    const lp=toXY(ax.deg,R.zodiacOut+14);
    // text-anchor based on position
    const ang=((ASC-ax.deg+180+360)%360);
    const anchor=ang<10||ang>350?'end':ang>170&&ang<190?'start':'middle';
    svg.appendChild(text(lp.x,lp.y,ax.lbl,'8.5',ax.col,'Inter,sans-serif',anchor,'middle','700'));
  });

  // ── ASPECT LINES ─────────────────────────────────────────────
  for(let i=0;i<planetData.length;i++){
    for(let j=i+1;j<planetData.length;j++){
      const asp=getWheelAsp(planetData[i].deg,planetData[j].deg);
      if(!asp) continue;
      const pi=toXY(planetData[i].deg,R.aspCircle);
      const pj=toXY(planetData[j].deg,R.aspCircle);
      const al=document.createElementNS('http://www.w3.org/2000/svg','line');
      al.setAttribute('x1',pi.x);al.setAttribute('y1',pi.y);
      al.setAttribute('x2',pj.x);al.setAttribute('y2',pj.y);
      al.setAttribute('stroke',asp.color);al.setAttribute('stroke-width','0.9');
      al.setAttribute('opacity','0.48');
      if(asp.dash) al.setAttribute('stroke-dasharray',asp.dash);
      svg.appendChild(al);
    }
  }

  // ── CENTER ────────────────────────────────────────────────────
  svg.appendChild(circ(R.center,'#f5f4f0','#ccc','0.8'));

  // ── PLANETS ───────────────────────────────────────────────────
  // Place just inside zodiac, resolve overlaps by pushing inward
  const placed=[];
  const sorted=[...planetData].sort((a,b)=>a.deg-b.deg);

  sorted.forEach(pl=>{
    let rP=R.planetRing;
    // Collision: push inward if within 8° angular and 20px radial of placed
    for(let iter=0;iter<10;iter++){
      let ok=true;
      for(const p of placed){
        let dif=Math.abs(pl.deg-p.deg)%360;if(dif>180)dif=360-dif;
        if(dif<8&&Math.abs(rP-p.r)<22){ok=false;break;}
      }
      if(ok) break;
      rP-=22;
    }
    placed.push({deg:pl.deg,r:rP});

    const pos=toXY(pl.deg,rP);

    // Tick on inner zodiac edge
    const t1=toXY(pl.deg,R.zodiacIn-1),t2=toXY(pl.deg,R.zodiacIn-9);
    svg.appendChild(line(t1.x,t1.y,t2.x,t2.y,pl.col,'2'));

    // Connector line
    const c1=toXY(pl.deg,R.zodiacIn-10),c2=toXY(pl.deg,rP+13);
    const conn=document.createElementNS('http://www.w3.org/2000/svg','line');
    conn.setAttribute('x1',c1.x);conn.setAttribute('y1',c1.y);
    conn.setAttribute('x2',c2.x);conn.setAttribute('y2',c2.y);
    conn.setAttribute('stroke',pl.col);conn.setAttribute('stroke-width','0.6');
    conn.setAttribute('opacity','0.45');
    svg.appendChild(conn);

    // Circle background
    svg.appendChild(circ(0,'none')); // spacer
    const bgC=document.createElementNS('http://www.w3.org/2000/svg','circle');
    bgC.setAttribute('cx',pos.x);bgC.setAttribute('cy',pos.y);bgC.setAttribute('r','13');
    bgC.setAttribute('fill','rgba(255,254,250,.96)');
    bgC.setAttribute('stroke',pl.col);bgC.setAttribute('stroke-width','1.4');
    svg.appendChild(bgC);

    // Glyph
    const pt=document.createElementNS('http://www.w3.org/2000/svg','text');
    pt.setAttribute('x',pos.x);pt.setAttribute('y',(+pos.y+1).toFixed(1));
    pt.setAttribute('text-anchor','middle');pt.setAttribute('dominant-baseline','middle');
    pt.setAttribute('font-size','15');pt.setAttribute('fill',pl.col);
    pt.setAttribute('font-family','Noto Sans Symbols 2,Segoe UI Symbol,Apple Symbols,Georgia,serif');
    pt.textContent=pl.sym;
    svg.appendChild(pt);

    // Degree label
    const degInSign=Math.floor(pl.deg%30);
    const minInSign=Math.round((pl.deg%1)*60);
    const dPos=toXY(pl.deg,rP-17);
    svg.appendChild(text(dPos.x,dPos.y,degInSign+'°'+(minInSign>0?minInSign+"'":''),'6.5','#aaa','Courier New,monospace'));
  });

  wrap.appendChild(svg);

  // ── LEGEND ────────────────────────────────────────────────────
  legend.innerHTML='';
  planetData.forEach(pl=>{
    const sgIdx=Math.floor(((pl.deg%360)+360)%360/30);
    const sgKey=SIGNS_ORDER[sgIdx];
    const sgObj=SG[sgKey]||{sym:'',n:''};
    const d=Math.floor(pl.deg%30),m=Math.round((pl.deg%1)*60);
    const item=document.createElement('div');item.className='wl-item';
    item.innerHTML=`<span class="wl-sym" style="color:${pl.col}">${pl.sym}</span><span style="font-weight:500">${pl.n}</span><span style="color:#bbb;font-size:13.5px">${d}°${m>0?m+"'":''}${sgObj.sym}</span>`;
    legend.appendChild(item);
  });

  // ── INFO LINE ─────────────────────────────────────────────────
  const infoEl=document.getElementById('wheel-info');
  if(infoEl){
    const ascSgIdx=Math.floor(((ASC%360)+360)%360/30);
    const ascSg=SG[SIGNS_ORDER[ascSgIdx]]||{n:''};
    const ascDeg=Math.floor(ASC%30);
    infoEl.textContent=`ASC ${ascDeg}°${ascSg.n} · MC ${Math.floor(MC%30)}°${(SG[SIGNS_ORDER[Math.floor(((MC%360)+360)%360/30)]]||{n:''}).n} · Regiomontanus · Sideral FB · 0°N 0°E 00:00`;
  }
}

function populateWheelFoto(day){
  const PD2=window.__EPHEM_DEGS||{};
  const SG_NAMES={ARI:'Áries',TAU:'Touro',GEM:'Gêmeos',CAN:'Câncer',LEO:'Leão',
    VIR:'Virgem',LIB:'Libra',SCO:'Escorpião',SAG:'Sagitário',CAP:'Capricórnio',AQU:'Aquário',PIS:'Peixes'};
  const ASP_SYMS2={sq:'□',conj:'☌',trine:'△',opp:'☍',sext:'✶'};
  const ASP_COL2={sq:'#cc2222',conj:'#3344cc',trine:'#1a9944',opp:'#cc6600',sext:'#0f7799'};
  const retros={Venus:[{s:2,e:127}],Mercurio:[{s:14,e:37},{s:109,e:133},{s:205,e:229},{s:301,e:324}]};
  const MD2=[31,28,31,30,31,30,31,31,30,31,30,31];
  const MNL2=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  function fd2(d){let a=0;for(let i=0;i<12;i++){if(d<=a+MD2[i])return(d-a)+' '+MNL2[i]+' 2026';a+=MD2[i];}return d+'';}
  function getPlSg(pl,d){if(!pl.tr)return null;const t=pl.tr.find(t=>d>=t.s&&d<=t.e);return t?t.sg:null;}

  // Build prompt
  let planetLines=[];
  PL.forEach(pl=>{
    const dk=window.__EPHEM_DEG_KEY&&window.__EPHEM_DEG_KEY[pl.id];
    const degs=dk&&PD2[dk];
    const deg=degs?degs[Math.min(day-1,364)]:null;
    const sgKey=getPlSg(pl,day);
    const sgName=SG_NAMES[sgKey]||sgKey||'?';
    const nak=deg!==null?getNakshatra(deg):null;
    const retList=retros[pl.id]||[];
    const isRet=retList.some(r=>day>=r.s&&day<=r.e);
    const degStr=deg!==null?Math.abs(((deg%30)+30)%30).toFixed(1)+'°':'?';
    planetLines.push(pl.sym+' '+pl.n+': '+sgName+' '+degStr+(isRet?' (retrógrado)':'')+(nak?' · nak: '+nak.name:''));
  });
  let aspLines=[];
  (['sq','conj','trine','opp','sext']).forEach(type=>{
    const arr=window['_asp_'+type]||[];
    arr.forEach(asp=>{
      if(asp.startDay<=day&&asp.endDay>=day){
        const pA2=PL.find(p=>p.id===asp.pA.id)||asp.pA;
        const pB2=PL.find(p=>p.id===asp.pB.id)||asp.pB;
        const sgA2=SG_NAMES[getPlSg(pA2,day)]||'?';
        const sgB2=SG_NAMES[getPlSg(pB2,day)]||'?';
        aspLines.push((ASP_SYMS2[type]||type)+' '+pA2.n+' ('+sgA2+') — '+pB2.n+' ('+sgB2+')');
      }
    });
  });
  const dateStr=fd2(day);
  let prompt='Astrologia sideral Fagan-Bradley \u2014 s\u00edntese energ\u00e9tica do dia '+dateStr+'.\n\nPosi\u00e7\u00f5es planet\u00e1rias (zod\u00edaco sideral):\n';
  prompt+=planetLines.join('\n');
  if(aspLines.length){prompt+='\n\nAspectos vigentes:\n'+aspLines.join('\n');}
  prompt+='\n\nCom base nessa configura\u00e7\u00e3o celestial, fa\u00e7a uma s\u00edntese em duas partes:\n\n1. COLETIVO: O que essa configura\u00e7\u00e3o tende a produzir no mundo? Geopolítica, mercados, tecnologia, movimentos sociais, clima institucional. Uma s\u00edntese, n\u00e3o uma lista.\n\n2. INDIVIDUAL: O que pode estar acontecendo na vida concreta das pessoas? Padr\u00f5es reconhec\u00edveis: conflitos, bloqueios, impulsos, oportunidades. Fale com quem est\u00e1 dormindo e com quem est\u00e1 acordado \u2014 sem rotular nenhum dos dois.\n\nTom: denso e curto. Cada frase carrega peso. Sem enchimento. Termine com uma pergunta ou imagem que fica.\n\nUse apenas o zod\u00edaco sideral Fagan-Bradley \u2014 n\u00e3o o tropical.';
    // Set IA buttons
  const gEl=document.getElementById('wf-google');
  const pEl=document.getElementById('wf-perplexity');
  const eEl=document.getElementById('wf-extract');
  if(gEl) gEl.href='https://www.google.com/search?q='+encodeURIComponent(prompt);
  if(pEl) pEl.href='https://www.perplexity.ai/?q='+encodeURIComponent(prompt);
  if(eEl){
    eEl.onclick=()=>{
      const blob=new Blob([prompt],{type:'text/plain;charset=utf-8'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download='foto_do_dia_'+dateStr.replace(/ /g,'_')+'_sideral.txt';
      a.click();URL.revokeObjectURL(url);
    };
  }

  // (lista de planetas e aspectos removida do card — a roda ocupa o espaço máximo;
  //  os dados completos seguem indo no prompt dos botões IA / Extrair)

  // Show the section
  const wf=document.getElementById('wheel-foto');
  if(wf) wf.style.display='flex';
}

// ── Zodiac wheel render dispatcher (Foto do Dia / Mapa Pessoal) ──
window._zwCurrentDay = null;
window._zwMode = 'today';

// ── Zoom & Pan da roda (SVG) — scroll/pinça + arrasto, mouse e toque ──
let _zwZoom=1,_zwPanX=0,_zwPanY=0,_zwPzWired=false;
function _zwApplyTransform(){
  const wrap=document.getElementById('wheel-zw-wrap');
  const svg=wrap&&wrap.querySelector('svg');
  if(svg){
    svg.style.transformOrigin='center center';
    svg.style.transform=`translate(${_zwPanX}px,${_zwPanY}px) scale(${_zwZoom})`;
    svg.style.willChange='transform';
  }
  const pct=document.getElementById('wheel-zoom-pct');
  if(pct) pct.textContent=Math.round(_zwZoom*100)+'%';
}
function _zwResetView(){ _zwZoom=1; _zwPanX=0; _zwPanY=0; _zwApplyTransform(); }
function _zwZoomAt(nz,clientX,clientY){
  const wrap=document.getElementById('wheel-zw-wrap'); if(!wrap) return;
  nz=Math.max(0.5,Math.min(6,nz)); if(nz===_zwZoom) return;
  const rect=wrap.getBoundingClientRect();
  const mx=clientX-rect.left-rect.width/2, my=clientY-rect.top-rect.height/2;
  const k=nz/_zwZoom;
  _zwPanX=mx-(mx-_zwPanX)*k; _zwPanY=my-(my-_zwPanY)*k;
  _zwZoom=nz; _zwApplyTransform();
}
function _zwWirePanZoom(){
  if(_zwPzWired) return;
  const wrap=document.getElementById('wheel-zw-wrap'); if(!wrap) return;
  _zwPzWired=true;
  wrap.style.touchAction='none';
  wrap.style.cursor='grab';
  const ptrs=new Map(); let panStart=null, pinchStart=null;
  wrap.addEventListener('pointerdown',e=>{
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size===1){ panStart={x:e.clientX,y:e.clientY,px:_zwPanX,py:_zwPanY,moved:false}; wrap.style.cursor='grabbing'; }
    else if(ptrs.size===2){ const[a,b]=[...ptrs.values()]; pinchStart={d:Math.hypot(a.x-b.x,a.y-b.y),z:_zwZoom,mx:(a.x+b.x)/2,my:(a.y+b.y)/2}; panStart=null; }
    wrap.setPointerCapture&&wrap.setPointerCapture(e.pointerId);
  });
  wrap.addEventListener('pointermove',e=>{
    if(!ptrs.has(e.pointerId)) return;
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(pinchStart&&ptrs.size===2){
      const[a,b]=[...ptrs.values()]; const d=Math.hypot(a.x-b.x,a.y-b.y);
      _zwZoomAt(pinchStart.z*(d/pinchStart.d), pinchStart.mx, pinchStart.my);
    }else if(panStart&&ptrs.size===1){
      const dx=e.clientX-panStart.x, dy=e.clientY-panStart.y;
      if(Math.abs(dx)+Math.abs(dy)>3) panStart.moved=true;
      if(panStart.moved){ _zwPanX=panStart.px+dx; _zwPanY=panStart.py+dy; _zwApplyTransform(); }
    }
  });
  const _end=e=>{
    ptrs.delete(e.pointerId);
    if(ptrs.size<2) pinchStart=null;
    if(ptrs.size===0){
      wrap.style.cursor='grab';
      if(panStart&&panStart.moved){ // suprime clique fantasma após arrasto
        const block=ev=>{ev.stopPropagation();ev.preventDefault();wrap.removeEventListener('click',block,true);};
        wrap.addEventListener('click',block,true);
        setTimeout(()=>wrap.removeEventListener('click',block,true),80);
      }
      panStart=null;
    }
  };
  wrap.addEventListener('pointerup',_end);
  wrap.addEventListener('pointercancel',_end);
  wrap.addEventListener('wheel',e=>{ e.preventDefault(); _zwZoomAt(_zwZoom*(e.deltaY>0?0.88:1.14), e.clientX, e.clientY); },{passive:false});
  // botões +/−/reset (centro da roda como âncora)
  const bi=document.getElementById('wz-in'), bo=document.getElementById('wz-out'), br=document.getElementById('wz-reset');

const _MX_SGN=['Áries','Touro','Gêmeos','Câncer','Leão','Virgem','Libra','Escorpião','Sagitário','Capricórnio','Aquário','Peixes'];

function _mxSep(a,b){let d=Math.abs(a-b)%360;return d>180?360-d:d;}
function _mxAspectType(a,b){const s=_mxSep(a,b);for(const k of _MX_COLORDER){const o=Math.abs(s-_MX_ASPDEF[k].ang);if(o<=_MX_ASPDEF[k].orb)return{k,orb:o};}return null;}
function _mxHouseOf(deg,casas){if(!casas)return null;deg=((deg%360)+360)%360;for(let h=0;h<12;h++){let a=casas[h],b=casas[(h+1)%12];let span=((b-a)%360+360)%360||30;let x=((deg-a)%360+360)%360;if(x<span)return h+1;}return 1;}
function _mxWeight(a,b){const sa=!_MX_FAST.includes(a)&&a!=='ASC'&&a!=='MC',sb=!_MX_FAST.includes(b)&&b!=='ASC'&&b!=='MC';return (sa&&sb)?'Pesado':((sa||sb)?'Médio':'Leve');}
function _mxWRank(a,b){const w=_mxWeight(a,b);return w==='Pesado'?0:(w==='Médio'?1:2);}

function _mxAspectsForMode(mode){

  } else if(mode==='natal'){
    const prof=NATAL_PROFILES[NATAL_ACTIVE]; if(!prof)return out;
    const N=getNatalPlanetsObj(prof), ids=ZW_DEG_IDS.filter(id=>N[id]);
    for(let i=0;i<ids.length;i++)for(let j=i+1;j<ids.length;j++){const a=ids[i],b=ids[j],t=_mxAspectType(N[a].deg,N[b].deg);if(t)out[t.k].push({a,b,aDeg:N[a].deg,bDeg:N[b].deg,orb:t.orb});}
  } else {

  _MX_COLORDER.forEach(k=>out[k].sort((x,y)=>_mxWRank(x.a,x.b)-_mxWRank(y.a,y.b)||x.orb-y.orb));

let _mxHLCard=null;
function _mxClearHL(){const g=document.getElementById('zw-hl');if(g)g.remove();if(_mxHLCard)_mxHLCard.classList.remove('sel');_mxHLCard=null;}
function _mxELof(deg){const i=_mxSgi(deg);return {emo:_MX_ELemo[_MX_EL[i]],el:_MX_EL[i],mod:_MX_MOD[i]};}
function _mxHighlight(asp,k,cardEl){
  const G=window.__ZWG, svg=document.querySelector('#wheel-zw-wrap svg'); if(!G||!svg)return;
  if(_mxHLCard===cardEl){_mxClearHL();return;}
  _mxClearHL(); _mxHLCard=cardEl; cardEl.classList.add('sel');
  const col=_MX_ASPDEF[k].col, isT=(G.mode==='transit'), NAKW=360/27, f=n=>(+n).toFixed(2);
  const ang=d=>((d-G.ASC+180)%360+360)%360;
  const xy=(d,r)=>{const a=ang(d)*Math.PI/180;return [G.cx+r*Math.cos(a),G.cy-r*Math.sin(a)];};
  const sector=(rO,rI,d0,d1)=>{const span=d1-d0,st=Math.max(2,Math.ceil(span/2));let p=[];for(let i=0;i<=st;i++)p.push(xy(d0+span*i/st,rO));for(let i=st;i>=0;i--)p.push(xy(d0+span*i/st,rI));return 'M'+p.map(q=>f(q[0])+','+f(q[1])).join(' L')+' Z';};
  const houseIdx=d=>{if(!G.casas)return null;d=((d%360)+360)%360;for(let h=0;h<12;h++){let a=G.casas[h],b=G.casas[(h+1)%12];let span=((b-a)%360+360)%360||30;let x=((d-a)%360+360)%360;if(x<span)return h;}return 0;};
  const signR=isT?[G.R.trSignOut,G.R.trSignIn]:[G.R.signOut,G.R.signIn];
  const nakR =isT?[G.R.trNakOut,G.R.trNakIn]:[G.R.nakOut,G.R.nakIn];
  const houseR=(G.R.houseOut!=null)?[G.R.houseOut,G.R.houseIn]:null;
  const pA=G.posNatal[asp.a]||{deg:asp.aDeg};
  const pB=(isT?(G.posTransit[asp.b]||G.posNatal[asp.b]):G.posNatal[asp.b])||{deg:asp.bDeg};
  let P=[];
  // furos únicos: evenodd cancela furos repetidos → dedup por signo/nak/casa (conserta conjunção no mesmo signo)
  const _seen=new Set(); const _holes=[];
  function addSlices(deg){
    const s0=Math.floor(((deg%360)+360)%360/30)*30, n0=Math.floor(((deg%360)+360)%360/NAKW)*NAKW;
    if(!_seen.has('s'+s0)){_seen.add('s'+s0);_holes.push(sector(signR[0],signR[1],s0,s0+30));}
    if(!_seen.has('n'+n0)){_seen.add('n'+n0);_holes.push(sector(nakR[0],nakR[1],n0,n0+NAKW));}
    if(houseR){const h=houseIdx(deg);if(h!=null&&!_seen.has('h'+h)){_seen.add('h'+h);const c0=G.casas[h],c1=G.casas[(h+1)%12];let span=((c1-c0)%360+360)%360||30;_holes.push(sector(houseR[0],houseR[1],c0,c0+span));}}
  }
  addSlices(pA.deg); addSlices(pB.deg);
  function _pxy(p){let x=p.x,y=p.y;if(x==null){const q=xy(p.deg,(houseR?houseR[1]:signR[1])-18);x=q[0];y=q[1];}return [x,y];}
  function _circ(x,y,rr){return 'M'+f(x-rr)+','+f(y)+' a'+rr+','+rr+' 0 1 0 '+(2*rr)+',0 a'+rr+','+rr+' 0 1 0 '+(-2*rr)+',0 Z';}
  const _A=_pxy(pA),_B=_pxy(pB),_r=30,_dd=Math.hypot(_A[0]-_B[0],_A[1]-_B[1]);
  if(_dd<_r*1.2){const mx=(_A[0]+_B[0])/2,my=(_A[1]+_B[1])/2;_holes.push(_circ(mx,my,_r+_dd/2));}
  else{_holes.push(_circ(_A[0],_A[1],_r));_holes.push(_circ(_B[0],_B[1],_r));}
  const veilD='M0,0 H1140 V1190 H0 Z '+_holes.join(' ');
  P.push('<path d="'+veilD+'" fill="rgba(3,4,12,0.84)" fill-rule="evenodd"/>');
  function edge(deg){let g='';const s0=Math.floor(((deg%360)+360)%360/30)*30,n0=Math.floor(((deg%360)+360)%360/NAKW)*NAKW;
    g+='<path d="'+sector(signR[0],signR[1],s0,s0+30)+'" fill="none" stroke="#fff" stroke-width="1.2" stroke-opacity="0.5"/>';
    g+='<path d="'+sector(nakR[0],nakR[1],n0,n0+NAKW)+'" fill="none" stroke="#fff" stroke-width="1" stroke-opacity="0.4"/>';
    if(houseR){const h=houseIdx(deg);if(h!=null){const c0=G.casas[h],c1=G.casas[(h+1)%12];let span=((c1-c0)%360+360)%360||30;g+='<path d="'+sector(houseR[0],houseR[1],c0,c0+span)+'" fill="none" stroke="#fff" stroke-width="1" stroke-opacity="0.4"/>';}}
    return g;}
  P.push(edge(pA.deg)); P.push(edge(pB.deg));
  function radial(deg){const e=xy(deg,signR[0]);return '<line x1="'+G.cx+'" y1="'+G.cy+'" x2="'+f(e[0])+'" y2="'+f(e[1])+'" stroke="'+col+'" stroke-width="1.6" stroke-opacity="0.8"/>';}
  P.push(radial(pA.deg)); P.push(radial(pB.deg));
  function mark(p,label){let x=p.x,y=p.y;if(x==null){const q=xy(p.deg,(houseR?houseR[1]:signR[1])-18);x=q[0];y=q[1];}
    return '<circle cx="'+f(x)+'" cy="'+f(y)+'" r="24" fill="none" stroke="'+col+'" stroke-width="2" stroke-opacity="0.9"/>'
      +'<text x="'+f(x)+'" y="'+f(y-32)+'" font-size="14" fill="#fff" font-weight="800" text-anchor="middle" stroke="#03040c" stroke-width="3.2" paint-order="stroke" font-family="Inter,sans-serif">'+label+'</text>';}
  P.push(mark(pA,(pA.name||_MX_PN[asp.a]||asp.a)+(isT?' (seu)':'')));
  P.push(mark(pB,(pB.name||_MX_PN[asp.b]||asp.b)+(isT?' (trânsito)':'')));
  const eA=_mxELof(pA.deg),eB=_mxELof(pB.deg);
  const legend=eA.emo+' '+eA.el+' '+eA.mod+'   '+_MX_ASYM[k]+'   '+eB.emo+' '+eB.el+' '+eB.mod+'   =   '+_MX_ASPDEF[k].nome;
  P.push('<rect x="0" y="1108" width="1140" height="62" fill="rgba(3,4,12,0.85)"/>');
  P.push('<text x="570" y="1140" font-size="23" fill="'+col+'" font-weight="800" text-anchor="middle" font-family="Inter,system-ui,sans-serif">'+legend+'</text>');
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');g.setAttribute('id','zw-hl');g.innerHTML=P.join('');
  svg.appendChild(g);
}
